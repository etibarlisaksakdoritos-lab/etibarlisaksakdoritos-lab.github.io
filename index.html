<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SİSTEMƏ SIZILIR...</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#0f0;font-family:'Orbitron',monospace;overflow-x:hidden;cursor:crosshair}
#matrix{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
.create-site-btn{position:fixed;top:15px;right:15px;z-index:999;background:rgba(0,0,0,.9);border:1px solid #0ff;padding:5px 12px;font-size:.65rem;color:#0ff;text-shadow:0 0 8px #0ff;font-family:'Orbitron';cursor:pointer;transition:.3s;-webkit-tap-highlight-color:transparent}
.create-site-btn:active{background:#0ff;color:#000;box-shadow:0 0 20px #0ff}
.content{position:relative;z-index:10;display:flex;flex-direction:column;justify-content:flex-start;align-items:center;min-height:auto;text-align:center;padding:60px 20px 20px}
.glitch{font-size:3rem;font-weight:900;text-transform:uppercase;text-shadow:0 0 10px #0f0,0 0 20px #0f0,0 0 30px #0f0;animation:glitch 2s infinite}
@keyframes glitch{0%,100%{transform:translate(0)}20%{transform:translate(-2px,2px)}40%{transform:translate(-2px,-2px)}60%{transform:translate(2px,2px)}80%{transform:translate(2px,-2px)}}
.warning{font-size:1.2rem;margin:20px 0;color:#f00;text-shadow:0 0 10px #f00;animation:blink 1s infinite}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
.access-btn{background:transparent;border:2px solid #0f0;color:#0f0;padding:15px 40px;font-size:1.1rem;font-family:'Orbitron';cursor:pointer;text-transform:uppercase;transition:.3s;box-shadow:0 0 20px #0f0;margin-top:20px;-webkit-tap-highlight-color:transparent;position:relative;z-index:999}
.access-btn:active{background:#0f0;color:#000;box-shadow:0 0 40px #0f0}
.hidden{display:none!important}
.terminal{text-align:left;font-size:.9rem;line-height:1.6;max-width:600px}
.terminal-line{opacity:0;animation:typewriter .5s forwards}
@keyframes typewriter{to{opacity:1}}
.password-box{margin-top:30px;opacity:0}
.password-input{background:#000;border:2px solid #0f0;color:#0f0;padding:10px 20px;font-family:'Orbitron';font-size:1rem;text-align:center;outline:none;box-shadow:0 0 15px #0f0;margin:10px;position:relative;z-index:999}
.final-message{margin-top:20px;font-size:1.5rem;text-shadow:0 0 15px #0f0;animation:blink .8s infinite}
.lesson-box{background:rgba(0,0,0,.85);border:2px solid #0f0;padding:15px;max-width:750px;text-align:left;box-shadow:0 0 30px #0f0;overflow-y:auto;max-height:70vh;margin-top:10px}
.lesson-box::-webkit-scrollbar{width:8px}
.lesson-box::-webkit-scrollbar-track{background:#000}
.lesson-box::-webkit-scrollbar-thumb{background:#0f0}
.code-block{background:#111;padding:10px;border-left:3px solid #0f0;font-family:monospace;margin:10px 0;white-space:pre-wrap}
.stats-box{background:rgba(0,255,0,.1);border:2px solid #0f0;padding:15px;margin-bottom:15px;text-align:center;font-size:1.1rem;text-shadow:0 0 10px #0f0}
.lesson-item{margin-bottom:25px;padding:15px;border:1px solid #030;transition:.3s}
.lesson-item.completed{border:1px solid #0f0;background:rgba(0,255,0,.05);box-shadow:0 0 15px #0f0}
.lesson-item.boss{border:2px solid #f00;background:rgba(255,0,0,.1);box-shadow:0 0 25px #f00;animation:blink 2s infinite}
.boss-btn{background:#f00;border:2px solid #f00;color:#fff;padding:10px 25px;font-size:1rem;font-family:'Orbitron';cursor:pointer;text-transform:uppercase;transition:.3s;box-shadow:0 0 30px #f00;margin-top:10px;animation:blink 1s infinite;position:relative;z-index:999}
.boss-btn:active{background:#000;color:#f00;box-shadow:0 0 50px #f00}
.complete-btn{background:transparent;border:1px solid #0f0;color:#0f0;padding:5px 15px;font-size:.8rem;font-family:'Orbitron';cursor:pointer;margin-top:10px;transition:.3s;position:relative;z-index:999}
.complete-btn:active{background:#0f0;color:#000}
.complete-btn.done{background:#0f0;color:#000;cursor:default}
.name-box{margin-bottom:20px}
.editor-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:9999;display:flex;justify-content:center;align-items:center;padding:20px}
.editor-box{background:#000;border:2px solid #0ff;padding:20px;max-width:900px;width:100%;height:90vh;display:flex;flex-direction:column;box-shadow:0 0 40px #0ff}
.editor-header{color:#0ff;font-size:1.2rem;text-align:center;margin-bottom:15px;text-shadow:0 0 10px #0ff}
.editor-textarea{background:#111;border:1px solid #0ff;color:#0ff;font-family:monospace;font-size:.8rem;padding:10px;flex:1;resize:none;outline:none}
.editor-output{background:#000;border:1px solid #0f0;color:#0f0;font-family:monospace;font-size:.8rem;padding:10px;height:150px;overflow-y:auto;margin-top:10px;white-space:pre-wrap}
.editor-btns{display:flex;gap:10px;margin-top:15px;flex-wrap:wrap}
.editor-btn{flex:1;min-width:120px;background:transparent;border:2px solid #0ff;color:#0ff;padding:10px;font-family:'Orbitron';cursor:pointer;text-transform:uppercase;transition:.3s;position:relative;z-index:999}
.editor-btn:active{background:#0ff;color:#000}
.editor-btn.run{border-color:#0f0;color:#0f0}
.editor-btn.run:active{background:#0f0;color:#000}
.editor-close{position:absolute;top:10px;right:15px;background:transparent;border:1px solid #f00;color:#f00;padding:5px 10px;cursor:pointer;font-family:'Orbitron';z-index:9999}
.loading{color:#FFD700;animation:blink 1s infinite}
.nav-btns{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
.nav-btn{background:transparent;border:2px solid #0f0;color:#0f0;padding:8px 20px;font-size:1.5rem;font-family:'Orbitron';cursor:pointer;transition:.3s;box-shadow:0 0 15px #0f0}
.nav-btn:active{background:#0f0;color:#000}
.nav-btn:disabled{opacity:0.3;cursor:not-allowed}
.lesson-counter{color:#0f0;font-size:1.1rem;text-shadow:0 0 10px #0f0}
@media(max-width:768px){.glitch{font-size:2rem}.warning{font-size:1rem}.lesson-box{max-width:95%;font-size:.75rem;max-height:65vh}.stats-box{font-size:.9rem}.create-site-btn{font-size:.55rem;padding:4px 8px}.editor-btns{flex-direction:column}}
</style>
</head>
<body>
<canvas id="matrix"></canvas>
<button class="create-site-btn" onclick="openEditor()">[ KOD YAZ + İŞLƏT ]</button>
<audio id="bgMusic" loop><source src="./nazar.mp3" type="audio/mpeg"></audio>
<audio id="beepSound"><source src="data:audio/wav;base64,UklGRlIAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQ4AAAAAAAD//wAA//8AAP//AAD//wAA" type="audio/wav"></audio>
<audio id="alarmSound"><source src="data:audio/wav;base64,UklGRjwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQgAAACAgICAgICAgICAgICAgICA" type="audio/wav"></audio>
<div id="allContent">
<div class="content" id="mainContent">
<div class="glitch">SİSTEMƏ SIZILIR</div>
<div class="warning">⚠ İCAZƏSİZ GİRİŞ AŞKARLANDI ⚠</div>
<button class="access-btn" onclick="startHack()">[ SİSTEMƏ SIZ ]</button>
</div>
<div class="content hidden" id="terminalContent">
<div class="terminal" id="terminal"></div>
<div class="password-box" id="passwordBox">
<div>> GİRİŞ ŞİFRƏSİNİ DAXİL ET:</div>
<input type="text" class="password-input" id="passInput" placeholder="doritos" onkeypress="if(event.key==='Enter'){checkPassword()}">
<button class="access-btn" onclick="checkPassword()" style="padding:10px 20px;margin-top:10px">[ GİR ]</button>
<div class="final-message hidden" id="finalMsg"></div>
</div>
</div>
</div>
<div class="editor-overlay hidden" id="editorOverlay">
<div class="editor-box">
<button class="editor-close" onclick="closeEditor()">[ X ]</button>
<div class="editor-header">💻 ZIYADI BABA PYTHON TERMINAL 💻</div>
<div style="color:#0ff;font-size:.8rem;margin-bottom:10px;text-align:left">> Real Python kodu yaz və işlət<br>> <span id="pyStatus" class="loading">Python yüklənir...</span></div>
<textarea class="editor-textarea" id="codeEditor">print("ZIYADI BABA LEGENDARY")</textarea>
<div class="editor-output" id="codeOutput">> Output burada görünəcək...</div>
<div class="editor-btns">
<button class="editor-btn run" onclick="runPythonCode()">[ ▶ İŞLƏT ]</button>
<button class="editor-btn" onclick="clearOutput()">[ TƏMİZLƏ ]</button>
</div>
</div>
</div>
<script>
let pyodide=null,pyodideReady=false,currentLesson=1;
const $=s=>document.querySelector(s);
const app=$('#allContent');
const lessons=[
{num:1,title:'PRINT - Ekrana yazdır',code:'print("ZIYADI BABA LEGENDARY")',desc:'Bu kod ekrana yazır'},
{num:2,title:'DƏYİŞƏN - Məlumat saxla',code:'ad = "Ziyadi"\nyas = 999\nprint(f"Salam {ad}, sənin {yas} IQ-un var")',desc:'Dəyişənlərlə məlumat saxla'},
{num:3,title:'IF - Şərt yoxla',code:'sifre = "doritos"\nif sifre == "doritos":\n    print("GİRİŞ TƏSDİQLƏNDİ")\nelse:\n    print("YANLIŞ ŞİFRƏ")',desc:'Bizim saytın məntiqi'},
{num:4,title:'FOR DÖVRÜ - Təkrarla',code:'for i in range(5):\n    print(f"HACK #{i+1} TAMAMLANDI")',desc:'5 dəfə təkrar'},
{num:5,title:'WHILE DÖVRÜ - Şərtli təkrar',code:'say = 0\nwhile say < 3:\n    print("Matrix yüklənir...")\n    say += 1',desc:'Şərt doğru olduqca'},
{num:6,title:'FUNKSİYA - Təkrar istifadə',code:'def salam_ver(ad):\n    return f"Xoş gəldin {ad}"\n\nprint(salam_ver("Hacker"))',desc:'Funksiyalar kod təkrarını azaldır'},
{num:7,title:'LİST - Çox məlumat',code:'hackerler = ["Ziyadi", "Doritos", "Matrix"]\nfor h in hackerler:\n    print(f"LEGENDARY: {h}")',desc:'List ilə çox məlumat'},
{num:8,title:'BOSS: MATRIX KODU',code:'import random\nwhile True:\n    print(random.choice([\'0\',\'1\']), end=\'\')',desc:'Arxadakı matrix budur'}
];

async function getRealIP(){
  try {
    const ipRes = await fetch('https://api.ipify.org?format=json');
    const ipData = await ipRes.json();
    const locRes = await fetch(`https://ipapi.co/${ipData.ip}/json/`);
    const locData = await locRes.json();
    return {
      ip: ipData.ip,
      city: locData.city || 'Naməlum',
      country: locData.country_name || 'Naməlum',
      browser: navigator.userAgent.includes('Chrome') ? 'Chrome' : 
               navigator.userAgent.includes('Firefox') ? 'Firefox' : 
               navigator.userAgent.includes('Safari') ? 'Safari' : 'Naməlum'
    }
  } catch(e) {
    return { ip: 'Yüklənmədi', city: 'Offline', country: '', browser: 'Ghost' }
  }
}

function playBeep(){const s=$('#beepSound');s.currentTime=0;s.play().catch(e=>{})}
function playAlarm(){const s=$('#alarmSound');s.currentTime=0;s.play().catch(e=>{})}
function vibrate(ms){if(navigator.vibrate)navigator.vibrate(ms)}
function openEditor(){playBeep();$('#editorOverlay').classList.remove('hidden')}
function closeEditor(){playBeep();$('#editorOverlay').classList.add('hidden')}
function clearOutput(){$('#codeOutput').textContent='> Output təmizləndi...'}
async function runPythonCode(){
if(!pyodideReady){$('#codeOutput').textContent='> Python hələ yüklənir...';return}
playBeep();vibrate(50);const code=$('#codeEditor').value;$('#codeOutput').textContent='> İşlədilir...\n';
try{
pyodide.runPython(`import sys\nfrom io import StringIO\nsys.stdout = StringIO()\nsys.stderr = StringIO()`);
await pyodide.runPythonAsync(code);
const stdout=pyodide.runPython("sys.stdout.getvalue()");
const stderr=pyodide.runPython("sys.stderr.getvalue()");
$('#codeOutput').textContent=stderr?'> XƏTA:\n'+stderr:'> OUTPUT:\n'+stdout;
}catch(err){$('#codeOutput').textContent='> XƏTA:\n'+err.message}
}

const canvas=$('#matrix'),ctx=canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
resize();window.onresize=resize;
const matrix="ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789@#$%^&*()*&^%+-/~{[|`]}".split("");
const fontSize=10,drops=Array(Math.floor(canvas.width/fontSize)).fill(1);
setInterval(()=>{ctx.fillStyle='rgba(0,0,0,.04)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#0f0';ctx.font=fontSize+'px monospace';for(let i=0;i<drops.length;i++){const text=matrix[Math.floor(Math.random()*matrix.length)];ctx.fillText(text,i*fontSize,drops[i]*fontSize);if(drops[i]*fontSize>canvas.height&&Math.random()>.975)drops[i]=0;drops[i]++}},35);

function startHack(){playBeep();$('#mainContent').classList.add('hidden');$('#terminalContent').classList.remove('hidden');const terminal=$('#terminal');const lines=['> Firewall bypass edilir...','> Root access əldə edilir...','> Şifrələnmiş fayllar açılır...','> Məlumatlar kopyalanır...','> İzlər silinir...','> SİSTEMƏ UĞURLA SIZILDI ✓','> ','> Sən həqiqəti görməyə hazırsan?'];let i=0;function typeLine(){if(i<lines.length){const line=document.createElement('div');line.className='terminal-line';line.style.animationDelay=i*.3+'s';line.textContent=lines[i];terminal.appendChild(line);i++;setTimeout(typeLine,800)}else{setTimeout(()=>{$('#passwordBox').style.opacity='1'},500)}}typeLine()}
function checkPassword(){playBeep();const pass=$('#passInput').value.trim().toLowerCase(),msg=$('#finalMsg');msg.classList.remove('hidden');if(pass==='doritos'){msg.textContent='GİRİŞ TƏSDİQLƏNDİ ✓';msg.style.color='#0f0';vibrate(100);setTimeout(()=>{loadAcademy()},1000)}else{msg.textContent='YANLIŞ ŞİFRƏ ✗';msg.style.color='#f00';$('#passInput').value='';vibrate([50,50,50])}}
function loadAcademy(){let hackerName=localStorage.getItem('ziyadiHackerName')||'';if(!hackerName){app.innerHTML=`<div class="content"><div style="font-size:2rem;margin-bottom:20px">HACKER ADINI DAXİL ET</div><div class="name-box"><input type="text" class="password-input" id="nameInput" placeholder="Adın" maxlength="15"><br><button class="access-btn" onclick="saveName()">[ BAŞLA ]</button></div></div>`}else{showLessons(hackerName)}}
function saveName(){const name=$('#nameInput').value.trim();if(name.length<2){alert('Ad ən azı 2 hərf olmalıdır!');vibrate(200);return}localStorage.setItem('ziyadiHackerName',name);showLessons(name)}
function updateStats(){const completed=JSON.parse(localStorage.getItem('ziyadiCompleted')||'[]');const goldMedals=parseInt(localStorage.getItem('ziyadiGoldMedals')||'0');const total=8;const percent=Math.round(completed.length/total*100);$('#statsBox').innerHTML=`PROGRESS: ${completed.length}/${total} DƏRS | ${percent}% TAMAMLANDI | 🏅 ${goldMedals} QIZIL MEDAL`}
function nextLesson(){if(currentLesson<8){playBeep();vibrate(50);currentLesson++;showLessons(localStorage.getItem('ziyadiHackerName'))}}
function prevLesson(){if(currentLesson>1){playBeep();vibrate(50);currentLesson--;showLessons(localStorage.getItem('ziyadiHackerName'))}}
function generateLesson(num){const lesson=lessons[num-1];const completed=JSON.parse(localStorage.getItem('ziyadiCompleted')||'[]');const done=completed.includes(num);const isBoss=num===8&&completed.length===7;if(isBoss&&!localStorage.getItem('bossDone')){return`<div class="lesson-item boss"><div style="font-size:1.2rem;font-weight:900;margin-bottom:10px;color:#f00;text-shadow:0 0 15px #f00">💀 BOSS LEVEL: MASTER HACK 💀</div><div style="font-size:.9rem;color:#f00;margin-bottom:10px">Təbriklər! 7 dərsi keçdin. İndi əsl hack zamanı:</div><div class="code-block">${lesson.code}</div><div style="font-size:.85rem;color:#f00;margin-top:8px">${lesson.desc}</div><button class="boss-btn" onclick="playAlarm();vibrate(100);bossActivated()">[ BOSS-U MƏHV ET ]</button></div>`}return`<div class="lesson-item ${done?'completed':''}"><div style="font-size:1rem;font-weight:700;margin-bottom:10px;color:#0f0">${done?'✓ ':''}SƏVİYYƏ ${num}: ${lesson.title}</div><div class="code-block">${lesson.code}</div><div style="font-size:.85rem;color:#0f0;margin-top:8px">// ${lesson.desc}</div><button class="complete-btn ${done?'done':''}" onclick="playBeep();vibrate(50);${done?'':'completeLesson('+num+')'}" ${done?'disabled':''}>${done?'[ TAMAMLANDI ✓ ]':'[ DƏRSİ BİTİRDİM ]'}</button></div>`}
function completeLesson(num){playBeep();vibrate(100);let completed=JSON.parse(localStorage.getItem('ziyadiCompleted')||'[]');if(!completed.includes(num)){completed.push(num);localStorage.setItem('ziyadiCompleted',JSON.stringify(completed));const name=localStorage.getItem('ziyadiHackerName');updateStats();showLessons(name);if(completed.length===8){playAlarm();vibrate([200,100,200]);setTimeout(()=>{alert('🔥 BOSS LEVEL AÇILDI! 🔥\n\n8 dərsin hamısını bitirdin!')},500)}}}
function bossActivated(){playAlarm();vibrate([300,100,300]);localStorage.setItem('bossDone','true');localStorage.setItem('ziyadiCompleted',JSON.stringify([1,2,3,4,5,6,7,8]));const name=localStorage.getItem('ziyadiHackerName');let goldMedals=parseInt(localStorage.getItem('ziyadiGoldMedals')||'0');goldMedals+=10;localStorage.setItem('ziyadiGoldMedals',goldMedals);alert('💀 BOSS MƏHV EDİLDİ 💀\n\nTəbriklər '+name+'!\nSən MASTER HACKER oldun!\n\n🏅 +10 QIZIL MEDAL');showLessons(name)}
async function showLessons(hackerName){
app.innerHTML=`<div class="content"><div style="font-size:2.5rem;font-weight:900;text-transform:uppercase;text-shadow:0 0 20px #0f0,0 0 40px #0f0;animation:blink .5s infinite;margin-bottom:10px">ZIYADI BABA</div><div style="font-size:1.1rem;color:#0f0;text-shadow:0 0 20px #0f0;margin-bottom:10px">✓ XOŞ GƏLDİN ${hackerName.toUpperCase()} ✓</div><div id="ipTracker" style="font-size:.7rem;color:#FFD700;text-shadow:0 0 10px #FFD700;margin-bottom:10px;border:1px solid #FFD700;padding:8px;background:rgba(255,215,0,.1)">👁️ IP YÜKLƏNİR...</div><div class="stats-box" id="statsBox"></div><div class="lesson-box"><div class="nav-btns"><button class="nav-btn" onclick="prevLesson()" ${currentLesson===1?'disabled':''}><</button><div class="lesson-counter">DƏRS ${currentLesson}/8</div><button class="nav-btn" onclick="nextLesson()" ${currentLesson===8?'disabled':''}>></button></div>${generateLesson(currentLesson)}</div></div>`;
updateStats();
const data = await getRealIP();
$('#ipTracker').innerHTML = `👁️ SƏNİN IP: ${data.ip} | YER: ${data.city}, ${data.country} | BRAUZER: ${data.browser}<br>STATUS: ZIYADI BABA SƏNİ İZLƏYİR`;
}

async function initPyodide(){
try{
pyodide=await loadPyodide();
pyodideReady=true;
$('#pyStatus').textContent='Python hazır ✓';
$('#pyStatus').className='';
}catch(e){$('#pyStatus').textContent='Python yüklənmədi';}
}
initPyodide();
</script>
</body>
</html>
