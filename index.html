<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SİSTEMƏ SIZILIR...</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #00ff00;
            font-family: 'Orbitron', monospace;
            overflow-x: hidden;
            min-height: 100vh;
            cursor: crosshair;
        }
        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .admin-badge {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 100;
            background: rgba(0,0,0,0.9);
            border: 1px solid #ff0000;
            padding: 5px 12px;
            font-size: 0.7rem;
            color: #ff0000;
            text-shadow: 0 0 8px #ff0000;
            animation: blink 1.5s infinite;
            display: none;
            font-weight: 900;
        }
        .admin-badge::before {
            content: "● ";
            color: #ff0000;
            animation: blink 0.8s infinite;
        }
       .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
       .glitch {
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
            animation: glitch 2s infinite;
            word-break: break-word;
            padding: 0 10px;
        }
        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }
        @keyframes glitchBoss {
            0%, 100% { transform: translate(0); filter: hue-rotate(0deg); }
            10% { transform: translate(-5px, 5px); filter: hue-rotate(90deg); }
            20% { transform: translate(-5px, -5px); filter: hue-rotate(180deg); }
            30% { transform: translate(5px, 5px); filter: hue-rotate(270deg); }
            40% { transform: translate(5px, -5px); filter: hue-rotate(360deg); }
        }
       .warning {
            font-size: 1rem;
            margin: 20px 0;
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
            animation: blink 1s infinite;
            padding: 0 10px;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
       .access-btn {
            background: transparent;
            border: 2px solid #00ff00;
            color: #00ff00;
            padding: 15px 30px;
            font-size: 1rem;
            font-family: 'Orbitron', monospace;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
            box-shadow: 0 0 20px #00ff00;
            margin-top: 20px;
            z-index: 20;
        }
       .access-btn:hover,.access-btn:active {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 40px #00ff00;
        }
       .hidden { display: none!important; }
       .terminal {
            text-align: left;
            font-size: 0.85rem;
            line-height: 1.6;
            max-width: 600px;
            padding: 0 10px;
        }
       .terminal-line {
            opacity: 0;
            animation: typewriter 0.5s forwards;
        }
        @keyframes typewriter {
            to { opacity: 1; }
        }
       .password-box {
            margin-top: 30px;
            opacity: 0;
        }
       .password-input {
            background: #000;
            border: 2px solid #00ff00;
            color: #00ff00;
            padding: 10px 20px;
            font-family: 'Orbitron', monospace;
            font-size: 1rem;
            text-align: center;
            outline: none;
            box-shadow: 0 0 15px #00ff00;
            margin: 10px;
            width: 200px;
        }
       .final-message {
            margin-top: 20px;
            font-size: 1.3rem;
            text-shadow: 0 0 15px #00ff00;
            animation: blink 0.8s infinite;
        }
       .lesson-box {
            background: rgba(0,0,0,0.85);
            border: 2px solid #00ff00;
            padding: 15px;
            max-width: 95%;
            width: 850px;
            text-align: left;
            box-shadow: 0 0 30px #00ff00;
            overflow-y: auto;
            max-height: 60vh;
            margin-top: 15px;
        }
       .lesson-box::-webkit-scrollbar { width: 8px; }
       .lesson-box::-webkit-scrollbar-track { background: #000; }
       .lesson-box::-webkit-scrollbar-thumb { background: #00ff00; }
       .code-block {
            background: #111;
            padding: 10px;
            border-left: 3px solid #00ff00;
            font-family: monospace;
            margin: 10px 0;
            white-space: pre-wrap;
            font-size: 0.8rem;
        }
       .download-btn {
            background: #ff0000;
            border: 2px solid #ff0000;
            color: #fff;
            padding: 12px 25px;
            font-size: 0.9rem;
            font-family: 'Orbitron', monospace;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
            box-shadow: 0 0 20px #ff0000;
            margin-top: 15px;
        }
       .cert-btn {
            background: #FFD700;
            border: 2px solid #FFD700;
            color: #000;
            padding: 12px 25px;
            font-size: 0.9rem;
            font-family: 'Orbitron', monospace;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
            box-shadow: 0 0 20px #FFD700;
            margin-top: 10px;
            font-weight: 900;
        }
       .stats-box {
            background: rgba(0,255,0,0.1);
            border: 2px solid #00ff00;
            padding: 12px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 1rem;
            text-shadow: 0 0 10px #00ff00;
        }
       .lesson-item {
            margin-bottom: 20px;
            padding: 12px;
            border: 1px solid #003300;
            transition: all 0.3s;
        }
       .lesson-item.completed {
            border: 1px solid #00ff00;
            background: rgba(0,255,0,0.05);
            box-shadow: 0 0 15px #00ff00;
        }
       .lesson-item.boss {
            border: 2px solid #ff0000;
            background: rgba(255,0,0,0.15);
            box-shadow: 0 0 35px #ff0000;
            /* BLINK SİLİNDİ - İNDİ HƏMİŞƏ GÖRÜNÜR */
        }
       .boss-title {
            color: #ff0000;
            margin-bottom: 8px;
            font-size: 1.1rem;
            text-shadow: 0 0 15px #ff0000;
            font-weight: 900;
        }
       .boss-warning {
            font-size: 0.85rem;
            margin: 12px 0;
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
        }
       .boss-btn {
            background: #ff0000;
            border: 2px solid #ff0000;
            color: #fff;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-family: 'Orbitron', monospace;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
            box-shadow: 0 0 30px #ff0000;
            margin-top: 10px;
        }
       .boss-btn:disabled {
            background: #330000;
            border: 2px solid #330000;
            color: #666;
            cursor: default;
            box-shadow: none;
        }
       .complete-btn {
            background: transparent;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 5px 15px;
            font-size: 0.8rem;
            font-family: 'Orbitron', monospace;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }
       .complete-btn.done {
            background: #00ff00;
            color: #000;
            cursor: default;
        }
       .medal-box {
            background: rgba(255,215,0,0.1);
            border: 1px solid #FFD700;
            padding: 10px;
            margin: 10px 0;
            text-align: center;
        }
       .medal {
            display: inline-block;
            margin: 5px;
            font-size: 1.3rem;
            opacity: 0.2;
            transition: all 0.3s;
        }
       .medal.unlocked {
            opacity: 1;
            text-shadow: 0 0 10px #FFD700;
            animation: blink 2s infinite;
        }
       .global-board {
            background: rgba(0,0,255,0.1);
            border: 1px solid #0088ff;
            padding: 12px;
            margin-top: 20px;
            max-height: 180px;
            overflow-y: auto;
        }
       .board-item {
            padding: 5px;
            margin: 3px 0;
            border-bottom: 1px solid #003366;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
        }
       .board-item.me {
            background: rgba(0,255,0,0.2);
            border: 1px solid #00ff00;
            font-weight: bold;
        }
       .board-item.admin {
            background: rgba(255,0,0,0.3);
            border: 1px solid #ff0000;
            color: #ff0000;
            text-shadow: 0 0 8px #ff0000;
            font-weight: 900;
        }
        @media (max-width: 480px) {
           .glitch { font-size: 1.8rem; }
           .warning { font-size: 0.9rem; }
           .lesson-box { font-size: 0.7rem; max-height: 50vh; }
           .stats-box { font-size: 0.85rem; }
           .medal { font-size: 1.1rem; }
           .board-item { font-size: 0.7rem; }
           .code-block { font-size: 0.7rem; }
           .admin-badge { font-size: 0.6rem; top: 10px; left: 10px; padding: 4px 8px; }
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    
    <div class="admin-badge" id="adminBadge">ADMIN ONLINE</div>

    <audio id="bgMusic" loop>
        <source src="./nazar.mp3" type="audio/mpeg">
    </audio>

    <div id="allContent">
        <div class="content" id="mainContent">
            <div class="glitch">SİSTEMƏ SIZILIR</div>
            <div class="warning">⚠ İCAZƏSİZ GİRİŞ AŞKARLANDI ⚠</div>
            <button class="access-btn" onclick="startHack()">[ SİSTEMƏ SIZ ]</button>
        </div>

        <div class="content hidden" id="terminalContent">
            <div class="terminal" id="terminal"></div>
            <div class="password-box" id="passwordBox">
                <div>> GİRİŞ ŞİFRƏSİNİ DAXİL ET:</div>
                <input type="text" class="password-input" id="passInput" placeholder="doritos" onkeypress="checkPassword(event)">
                <button class="access-btn" onclick="checkPassword({type:'click'})" style="padding: 10px 20px; margin-top: 10px;">[ GİR ]</button>
                <div class="final-message hidden" id="finalMsg"></div>
            </div>
        </div>
    </div>

    <script>
        let jsPDF;
        try {
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
            script.onload = () => { jsPDF = window.jspdf.jsPDF; };
            document.head.appendChild(script);
        } catch(e) { console.log('PDF kitabxanası yüklənmədi'); }

        const ADMIN_KEY = "supersecret123"; // GİZLİ AÇAR - DƏYİŞƏ BİLƏRSƏN
        const ADMIN_TIMEOUT = 3 * 60 * 1000;

        function isAdmin() {
            return localStorage.getItem('ziyadiAdmin') === ADMIN_KEY;
        }

        function checkAdminStatus() {
            const adminTime = parseInt(localStorage.getItem('ziyadiAdminOnline') || '0');
            const now = Date.now();
            const isOnline = (now - adminTime) < ADMIN_TIMEOUT;
            
            if (isOnline) {
                document.getElementById('adminBadge').style.display = 'block';
            } else {
                document.getElementById('adminBadge').style.display = 'none';
            }
            return isOnline;
        }

        function setAdminOnline() {
            if (isAdmin()) {
                localStorage.setItem('ziyadiAdminOnline', Date.now().toString());
                document.getElementById('adminBadge').style.display = 'block';
            }
        }

        setInterval(() => {
            checkAdminStatus();
            if (isAdmin()) setAdminOnline();
        }, 20000);

        checkAdminStatus();

        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        const matrix = "ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789@#$%^&*()*&^%+-/~{[|`]}";
        const matrixArray = matrix.split("");
        const fontSize = 10;
        let columns = canvas.width / fontSize;
        let drops = [];
        for(let x = 0; x < columns; x++) drops[x] = 1;
        let matrixSpeed = 35;
        let matrixInterval = setInterval(drawMatrix, matrixSpeed);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.04)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff00';
            ctx.font = fontSize + 'px monospace';
            for(let i = 0; i < drops.length; i++) {
                const text = matrixArray[Math.floor(Math.random() * matrixArray.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }

        function downloadLessons() {
            const codeContent = `# ZIYADI BABA HACKER AKADEMIYASI\nprint("ZIYADI BABA LEGENDARY")\nad = "Ziyadi"\nyas = 999\nprint(f"Salam {ad}, senin {yas} IQ-un var")\nsifre = "doritos"\nif sifre == "doritos":\n print("GIRIS TESDIQLENDI")\nfor i in range(5):\n print(f"HACK #{i+1} TAMAMLANDI")\nsay = 0\nwhile say < 3:\n print("Matrix yuklenir...")\n say += 1\ndef salam_ver(ad):\n return f"Xos geldin {ad}, sen efsanesen!"\nprint(salam_ver("Hacker"))\nhackerler = ["Ziyadi", "Doritos", "Matrix"]\nfor h in hackerler:\n print(f"LEGENDARY: {h}")\nimport random\nwhile True:\n print(random.choice(['0','1']), end='')`;
            const blob = new Blob(['\uFEFF' + codeContent], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'ziyadi_baba_python_dersleri.py';
            a.click();
            URL.revokeObjectURL(url);
        }

        function generateCertificate() {
            if (!jsPDF) {
                alert('Sertifikat kitabxanası yüklənmədi. İnterneti yoxla qaqa!');
                return;
            }
            const doc = new jsPDF();
            const name = localStorage.getItem('ziyadiHackerName') || 'HACKER';
            const date = new Date().toLocaleDateString('az-AZ');
            const certNum = 'ZB-' + Math.floor(Math.random()*9000+1000);

            doc.setFillColor(0, 0, 0);
            doc.rect(0, 0, 210, 297, 'F');
            doc.setDrawColor(0, 255, 0);
            doc.setLineWidth(3);
            doc.rect(10, 10, 190, 277);
            doc.setDrawColor(255, 215, 0);
            doc.setLineWidth(1);
            doc.rect(15, 15, 180, 267);

            doc.setTextColor(0, 255, 0);
            doc.setFontSize(30);
            doc.setFont('helvetica', 'bold');
            doc.text('ZIYADI BABA', 105, 40, { align: 'center' });
            doc.setFontSize(20);
            doc.text('HACKER AKADEMIYASI', 105, 55, { align: 'center' });

            doc.setTextColor(255, 215, 0);
            doc.setFontSize(16);
            doc.text('SERTIFIKAT', 105, 80, { align: 'center' });

            doc.setTextColor(0, 255, 0);
            doc.setFontSize(12);
            doc.text('Bu sertifikat tesdiq edir ki:', 105, 100, { align: 'center' });

            doc.setFontSize(24);
            doc.setTextColor(255, 0, 0);
            doc.text(name.toUpperCase(), 105, 120, { align: 'center' });

            doc.setTextColor(0, 255, 0);
            doc.setFontSize(14);
            doc.text('resmi olaraq', 105, 135, { align: 'center' });
            doc.setFontSize(18);
            doc.setTextColor(255, 215, 0);
            doc.text('PYTHON MASTER HACKER', 105, 150, { align: 'center' });
            doc.setFontSize(14);
            doc.setTextColor(0, 255, 0);
            doc.text('+ MATRIX OVERLORD', 105, 165, { align: 'center' });
            doc.text('statusunu qazanmisdir', 105, 180, { align: 'center' });

            doc.setFontSize(10);
            doc.text(`Tarix: ${date}`, 105, 220, { align: 'center' });
            doc.text(`Sertifikat №: ${certNum}`, 105, 230, { align: 'center' });

            doc.setFontSize(12);
            doc.setTextColor(255, 0, 0);
            doc.text('Imza: Ziyadi Baba ✓', 105, 255, { align: 'center' });

            doc.save(`Ziyadi_Baba_Sertifikat_${name}.pdf`);
        }

        function startHack() {
            const music = document.getElementById('bgMusic');
            music.play().catch(e => console.log('Auto play bloklandı'));

            document.getElementById('mainContent').classList.add('hidden');
            document.getElementById('terminalContent').classList.remove('hidden');

            const terminal = document.getElementById('terminal');
            const lines = [
                '> Firewall bypass edilir...',
                '> Root access əldə edilir...',
                '> Şifrələnmiş fayllar açılır...',
                '> Məlumatlar kopyalanır...',
                '> İzlər silinir...',
                '> SİSTEMƏ UĞURLA SIZILDI ✓',
                '> ',
                '> Sən həqiqəti görməyə hazırsan?'
            ];

            let i = 0;
            function typeLine() {
                if (i < lines.length) {
                    const line = document.createElement('div');
                    line.className = 'terminal-line';
                    line.style.animationDelay = i * 0.3 + 's';
                    line.textContent = lines[i];
                    terminal.appendChild(line);
                    i++;
                    setTimeout(typeLine, 800);
                } else {
                    setTimeout(() => {
                        document.getElementById('passwordBox').style.opacity = '1';
                    }, 500);
                }
            }
            typeLine();
        }

        function checkPassword(event) {
            if (event.key === 'Enter' || event.type === 'click') {
                const pass = document.getElementById('passInput').value.trim().toLowerCase();
                const msg = document.getElementById('finalMsg');
                msg.classList.remove('hidden');

                if (pass === 'doritos') {
                    msg.textContent = 'GİRİŞ TƏSDİQLƏNDİ ✓';
                    msg.style.color = '#00ff00';
                    setTimeout(() => { loadAcademy(); }, 1000);
                } else {
                    msg.textContent = 'YANLIŞ ŞİFRƏ ✗';
                    msg.style.color = '#ff0000';
                    document.getElementById('passInput').value = '';
                }
            }
        }

        function loadAcademy() {
            let hackerName = localStorage.getItem('ziyadiHackerName') || '';

            if (!hackerName) {
                document.getElementById('allContent').innerHTML = `
                    <div class="content">
                        <div style="font-size:1.8rem;margin-bottom:20px;">HACKER ADINI DAXİL ET</div>
                        <div class="name-box">
                            <input type="text" class="password-input" id="nameInput" placeholder="Adın" maxlength="15">
                            <br>
                            <button class="access-btn" onclick="saveName()">[ BAŞLA ]</button>
                        </div>
                    </div>
                `;
            } else {
                if (isAdmin()) setAdminOnline();
                showLessons(hackerName);
            }
            document.getElementById('bgMusic').play().catch(e => {});
        }

        function saveName() {
            const name = document.getElementById('nameInput').value.trim();
            if (name.length < 2) {
                alert('Ad ən azı 2 hərf olmalıdır qardaş!');
                return;
            }
            localStorage.setItem('ziyadiHackerName', name);
            localStorage.setItem('ziyadiFirstLogin', 'true');
            updateGlobalBoard(name, 0, false);
            showLessons(name);
        }

        function showLessons(hackerName) {
            if (isAdmin()) setAdminOnline();
            let completed = JSON.parse(localStorage.getItem('ziyadiCompleted') || '[]');
            let bossUnlocked = completed.length === 8;
            let bossCompleted = localStorage.getItem('ziyadiBossCompleted') === 'true';

            document.getElementById('allContent').innerHTML = `
                <div class="content">
                    <div style="font-size:2.2rem;font-weight:900;text-transform:uppercase;text-shadow:0 0 20px #00ff00, 0 0 40px #00ff00;animation:blink 0.5s infinite;margin-bottom:10px;">ZIYADI BABA</div>
                    <div style="font-size:1rem;color:#00ff00;text-shadow:0 0 20px #00ff00;margin-bottom:10px;">✓ XOŞ GƏLDİN ${hackerName.toUpperCase()} ✓</div>

                    <div class="stats-box" id="statsBox"></div>
                    <div class="medal-box" id="medalBox"></div>

                    <div class="lesson-box" id="lessonBox">
                        <div style="font-size:1.1rem;margin-bottom:15px;color:#00ff00;text-align:center;">🔥 DƏRS 1: PYTHON İLƏ HACK BAŞLAYIR 🔥</div>

                        ${generateLesson(1, 'PRINT - Ekrana yazdır', 'print("ZIYADI BABA LEGENDARY")', 'Bu kod ekrana yazır', completed)}
                        ${generateLesson(2, 'DƏYİŞƏN - Məlumat saxla', 'ad = "Ziyadi"\nyas = 999\nprint(f"Salam {ad}")', 'Dəyişənlərlə məlumat saxla', completed)}
                        ${generateLesson(3, 'IF - Şərt yoxla', 'sifre = "doritos"\nif sifre == "doritos":\n print("GİRİŞ TƏSDİQLƏNDİ")', 'Bizim saytın məntiqi 😂', completed)}
                        ${generateLesson(4, 'FOR DÖVRÜ - Təkrarla', 'for i in range(5):\n print(f"HACK #{i+1}")', '5 dəfə təkrarlayır', completed)}
                        ${generateLesson(5, 'WHILE DÖVRÜ', 'say = 0\nwhile say < 3:\n print("Matrix...")\n say += 1', 'Şərt doğru olduqca işləyir', completed)}
                        ${generateLesson(6, 'FUNKSİYA', 'def salam(ad):\n return f"Xoş gəldin {ad}"\nprint(salam("Hacker"))', 'Kod təkrarının qarşısını alır', completed)}
                        ${generateLesson(7, 'LİST', 'hackerler = ["Ziyadi","Doritos"]\nfor h in hackerler:\n print(h)', 'Çox məlumatı bir yerdə saxla', completed)}
                        ${generateLesson(8, 'BOSS: MATRIX', 'import random\nwhile True:\n print(random.choice([\'0\',\'1\']), end=\'\')', 'Sonsuz 0 və 1 😎', completed)}

                        ${bossUnlocked? generateBossLevel(hackerName, bossCompleted) : ''}

                        <div style="text-align:center;margin-top:25px;font-size:0.9rem;color:#00ff00;">
                            > ZIYADI BABA DEYİR: KOPYALA, ÖYRƏN, HACK ELƏ <
                        </div>

                        <div style="text-align:center;">
                            <button class="download-btn" onclick="downloadLessons()">[ KODLARI YÜKLƏ.PY ]</button>
                            ${bossCompleted? '<br><button class="cert-btn" onclick="generateCertificate()">[ 🎓 SERTİFİKAT YÜKLƏ ]</button>' : ''}
                        </div>

                        <div class="global-board" id="globalBoard">
                            <div style="color:#0088ff;margin-bottom:10px;text-align:center;">🌍 GLOBAL LEADERBOARD</div>
                        </div>
                    </div>
                </div>
            `;
            updateStats();
            updateMedals();
            renderGlobalBoard();
        }

        function generateLesson(num, title, code, desc, completed) {
            const isDone = completed.includes(num);
            return `
                <div class="lesson-item ${isDone? 'completed' : ''}" id="lesson${num}">
                    <div style="color:#ff0000;margin-bottom:8px;">> SƏVİYYƏ ${num}: ${title}</div>
                    <div class="code-block">${code}</div>
                    <div style="font-size:0.75rem;margin-top:5px;color:#888;">// ${desc}</div>
                    <button class="complete-btn ${isDone? 'done' : ''}" onclick="completeLesson(${num})" ${isDone? 'disabled' : ''}>
                        ${isDone? '[✓ TAMAMLANDI]' : '[ OXUDUM ]'}
                    </button>
                </div>
            `;
        }

        function generateBossLevel(name, completed) {
            return `
                <div class="lesson-item boss" id="bossLevel">
                    <div class="boss-title">> SƏVİYYƏ 9: HACK THE MATRIX 🔒</div>
                    <div class="boss-warning">⚠ GİZLİ BOSS LEVEL AÇILDI ⚠</div>
                    <div class="code-block" style="border-left: 3px solid #ff0000;"># BOSS KODU: MATRIX-I ƏLƏ KEÇİR\nimport random\nwhile True:\n print(random.choice(['0','1']), end='') # ZIYADI BABA: ${name}</div>
                    <button class="boss-btn" onclick="activateBossMode()" ${completed? 'disabled' : ''}>
                        ${completed? '[✓ MATRIX HACK EDİLDİ]' : '[ 🔥 MATRIX-I HACK ELƏ 🔥 ]'}
                    </button>
                </div>
            `;
        }

        function completeLesson(num) {
            let completed = JSON.parse(localStorage.getItem('ziyadiCompleted') || '[]');
            if (!completed.includes(num)) {
                completed.push(num);
                localStorage.setItem('ziyadiCompleted', JSON.stringify(completed));
                document.getElementById(`lesson${num}`).classList.add('completed');
                const btn = document.querySelector(`#lesson${num} .complete-btn`);
                btn.textContent = '[✓ TAMAMLANDI]';
                btn.classList.add('done');
                btn.disabled = true;

                const name = localStorage.getItem('ziyadiHackerName');
                updateGlobalBoard(name, completed.length, false);

                updateStats();
                updateMedals();

                if (completed.length === 8) {
                    setTimeout(() => { location.reload(); }, 500);
                }
            }
        }

        function activateBossMode() {
            if (localStorage.getItem('ziyadiBossCompleted') === 'true') return;

            clearInterval(matrixInterval);
            matrixSpeed = 10;
            matrixInterval = setInterval(drawMatrix, matrixSpeed);

            document.body.style.animation = 'glitchBoss 0.3s infinite';

            localStorage.setItem('ziyadiBossCompleted', 'true');
            const name = localStorage.getItem('ziyadiHackerName');
            updateGlobalBoard(name, 8, true);

            alert('🔥 MATRIX HACK EDİLDİ 🔥\n\nZIYADI BABA: ' + name + '\nSTATUS: MATRIX OVERLORD ✓');

            setTimeout(() => {
                document.body.style.animation = '';
                clearInterval(matrixInterval);
                matrixSpeed = 35;
                matrixInterval = setInterval(drawMatrix, matrixSpeed);
                location.reload();
            }, 4000);
        }

        function updateStats() {
            let completed = JSON.parse(localStorage.getItem('ziyadiCompleted') || '[]');
            let count = completed.length;
            let stars = '★'.repeat(count) + '☆'.repeat(8-count);
            let name = localStorage.getItem('ziyadiHackerName') || 'HACKER';
            let bossDone = localStorage.getItem('ziyadiBossCompleted') === 'true';
            let admin = isAdmin();

            let status = '';
            if (bossDone) {
                status = '<br>> STATUS: <span style="color:#ff0000;">MATRIX OVERLORD ✓</span>';
            } else if (count === 8) {
                status = '<br>> STATUS: <span style="color:#ff0000;">MASTER HACKER ✓</span>';
            } else if (count >= 5) {
                status = '<br>> STATUS: SENIOR HACKER';
            } else if (count >= 3) {
                status = '<br>> STATUS: JUNIOR HACKER';
            } else {
                status = '<br>> STATUS: NOOB HACKER';
            }

            if (admin) {
                status += '<br>> ROL: <span style="color:#ff0000;text-shadow:0 0 10px #ff0000;">ADMIN 👑</span>';
            }

            document.getElementById('statsBox').innerHTML =
                `> HACKER: ${name.toUpperCase()}<br>> PROGRESS: ${count}/8 ${stars}${status}`;
        }
