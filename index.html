        #matrix {

            pointer-events: none;
        }
        .admin-badge {
            position: fixed;
            top: 15px;

        .admin-badge::before {
            content: "● ";

            animation: blink 0.8s infinite;
        }
       .content {
            position: relative;

       .glitch {
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
            animation: glitch 2s infinite;
            word-break: break-word;
            padding: 0 10px;
        }
        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }
        @keyframes glitchBoss {
            0%, 100% { transform: translate(0); filter: hue-rotate(0deg); }
            10% { transform: translate(-5px, 5px); filter: hue-rotate(90deg); }
            20% { transform: translate(-5px, -5px); filter: hue-rotate(180deg); }
            30% { transform: translate(5px, 5px); filter: hue-rotate(270deg); }
            40% { transform: translate(5px, -5px); filter: hue-rotate(360deg); }
        }
       .warning {
            font-size: 1rem;
            margin: 20px 0;
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
            animation: blink 1s infinite;
            padding: 0 10px;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
