<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SİSTEMƏ SIZILIR...</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#0f0;font-family:'Orbitron',monospace;overflow:hidden;height:100vh;cursor:crosshair}
#matrix{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}
.admin{position:fixed;top:15px;left:15px;z-index:99;background:rgba(0,0,0,.9);border:1px solid #f00;padding:5px 12px;font-size:.7rem;color:#f00;text-shadow:0 0 8px #f00;font-weight:900}
.admin::before{content:"● ";animation:blink.8s infinite}
.content{position:relative;z-index:10;display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;text-align:center;padding:20px}
.glitch{font-size:3rem;font-weight:900;text-transform:uppercase;text-shadow:0 0 10px #0f0,0 0 20px #0f0,0 0 30px #0f0;animation:glitch 2s infinite}
@keyframes glitch{0%,100%{transform:translate(0)}20%{transform:translate(-2px,2px)}40%{transform:translate(-2px,-2px)}60%{transform:translate(2px,2px)}80%{transform:translate(2px,-2px)}}
@keyframes glitchBoss{0%,100%{transform:translate(0);filter:hue-rotate(0deg)}10%{transform:translate(-5px,5px);filter:hue-rotate(90deg)}20%{transform:translate(-5px,-5px);filter:hue-rotate(180deg)}30%{transform:translate(5px,5px);filter:hue-rotate(270deg)}40%{transform:translate(5px,-5px);filter:hue-rotate(360deg)}}
.warning{font-size:1.2rem;margin:20px 0;color:#f00;text-shadow:0 0 10px #f00;animation:blink 1s infinite}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
.access-btn{background:transparent;border:2px solid #0f0;color:#0f0;padding:15px 40px;font-size:1.1rem;font-family:'Orbitron';cursor:pointer;text-transform:uppercase;transition:.3s;box-shadow:0 0 20px #0f0;margin-top:20px}
.access-btn:hover,.access-btn:active{background:#0f0;color:#000;box-shadow:0 0 40px #0f0}
.hidden{display:none!important}
.terminal{text-align:left;font-size:.9rem;line-height:1.6;max-width:600px}
.terminal-line{opacity:0;animation:typewriter .5s forwards}
@keyframes typewriter{to{opacity:1}}
.password-box{margin-top:30px;opacity:0}
.password-input{background:#000;border:2px solid #0f0;color:#0f0;padding:10px 20px;font-family:'Orbitron';font-size:1rem;text-align:center;outline:none;box-shadow:0 0 15px #0f0;margin:10px}
.final-message{margin-top:20px;font-size:1.5rem;text-shadow:0 0 15px #0f0;animation:blink .8s infinite}
.lesson-box{background:rgba(0,0,0,.85);border:2px solid #0f0;padding:20px;max-width:750px;text-align:left;box-shadow:0 0 30px #0f0;overflow-y:auto;max-height:60vh;margin-top:15px}
.lesson-box::-webkit-scrollbar{width:8px}
.lesson-box::-webkit-scrollbar-track{background:#000}
.lesson-box::-webkit-scrollbar-thumb{background:#0f0}
.code-block{background:#111;padding:10px;border-left:3px solid #0f0;font-family:monospace;margin:10px 0;white-space:pre-wrap}
.download-btn{background:#f00;border:2px solid #f00;color:#fff;padding:12px 30px;font-size:1rem;font-family:'Orbitron';cursor:pointer;text-transform:uppercase;transition:.3s;box-shadow:0 0 20px #f00;margin-top:20px;text-decoration:none;display:inline-block}
.download-btn:hover{background:#000;color:#f00;box-shadow:0 0 40px #f00}
.stats-box{background:rgba(0,255,0,.1);border:2px solid #0f0;padding:15px;margin-bottom:15px;text-align:center;font-size:1.1rem;text-shadow:0 0 10px #0f0}
.lesson-item{margin-bottom:25px;padding:15px;border:1px solid #030;transition:.3s}
.lesson-item.completed{border:1px solid #0f0;background:rgba(0,255,0,.05);box-shadow:0 0 15px #0f0}
.lesson-item.boss{border:2px solid #f00;background:rgba(255,0,0,.1);box-shadow:0 0 25px #f00;animation:blink 2s infinite}
.boss-btn{background:#f00;border:2px solid #f00;color:#fff;padding:10px 25px;font-size:1rem;font-family:'Orbitron';cursor:pointer;text-transform:uppercase;transition:.3s;box-shadow:0 0 30px #f00;margin-top:10px;animation:blink 1s infinite}
.boss-btn:hover{background:#000;color:#f00;box-shadow:0 0 50px #f00}
.complete-btn{background:transparent;border:1px solid #0f0;color:#0f0;padding:5px 15px;font-size:.8rem;font-family:'Orbitron';cursor:pointer;margin-top:10px;transition:.3s}
.complete-btn:hover{background:#0f0;color:#000}
.complete-btn.done{background:#0f0;color:#000;cursor:default}
.name-box{margin-bottom:20px}
.quest-box{background:rgba(255,215,0,.1);border:2px solid #FFD700;padding:15px;margin-bottom:15px;text-align:center;box-shadow:0 0 20px #FFD700;animation:blink 3s infinite}
.quest-btn{background:transparent;border:2px solid #FFD700;color:#FFD700;padding:10px 25px;font-size:.9rem;font-family:'Orbitron';cursor:pointer;text-transform:uppercase;transition:.3s;box-shadow:0 0 15px #FFD700;margin-top:10px}
.quest-btn:hover{background:#FFD700;color:#000}
.quest-btn.done{background:#FFD700;color:#000;cursor:default;animation:none}
.medal-counter{display:inline-block;margin-left:10px;font-size:1.2rem}
@media(max-width:768px){.glitch{font-size:2rem}.warning{font-size:1rem}.lesson-box{max-width:95%;font-size:.75rem;max-height:55vh}.stats-box{font-size:.9rem}}
</style>
</head>
<body>
<canvas id="matrix"></canvas>
<div class="admin" id="adminBadge" style="display:none">ADMIN ONLINE</div>
<audio id="bgMusic" loop><source src="./nazar.mp3" type="audio/mpeg"></audio>
<div id="allContent">
<div class="content" id="mainContent">
<div class="glitch">SİSTEMƏ SIZILIR</div>
<div class="warning">⚠ İCAZƏSİZ GİRİŞ AŞKARLANDI ⚠</div>
<button class="access-btn" onclick="startHack()">[ SİSTEMƏ SIZ ]</button>
</div>
<div class="content hidden" id="terminalContent">
<div class="terminal" id="terminal"></div>
<div class="password-box" id="passwordBox">
<div>> GİRİŞ ŞİFRƏSİNİ DAXİL ET:</div>
<input type="text" class="password-input" id="passInput" placeholder="doritos" onkeypress="checkPassword(event)">
<button class="access-btn" onclick="checkPassword({type:'click'})" style="padding:10px 20px;margin-top:10px">[ GİR ]</button>
<div class="final-message hidden" id="finalMsg"></div>
</div>
</div>
</div>
<script>
const ADMIN_KEY="ZIYADIMARKA";
const $=s=>document.querySelector(s);
const app=$('#allContent');
if(new URLSearchParams(location.search).get('admin')===ADMIN_KEY){localStorage.setItem('admin',ADMIN_KEY);history.replaceState({},'',location.pathname)}
const isAdmin=()=>localStorage.getItem('admin')===ADMIN_KEY;
if(isAdmin()){$('#adminBadge').style.display='block'}
const canvas=$('#matrix'),ctx=canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
resize();window.onresize=resize;
const matrix="ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789@#$%^&*()*&^%+-/~{[|`]}";
const matrixArray=matrix.split("");
const fontSize=10,columns=canvas.width/fontSize,drops=Array(Math.floor(columns)).fill(1);
let matrixSpeed=35,matrixInterval=setInterval(drawMatrix,matrixSpeed);
function drawMatrix(){ctx.fillStyle='rgba(0,0,0,.04)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#0f0';ctx.font=fontSize+'px monospace';for(let i=0;i<drops.length;i++){const text=matrixArray[Math.floor(Math.random()*matrixArray.length)];ctx.fillText(text,i*fontSize,drops[i]*fontSize);if(drops[i]*fontSize>canvas.height&&Math.random()>.975)drops[i]=0;drops[i]++}}
function downloadLessons(){const codeContent=`# ZIYADI BABA HACKER AKADEMIYASI - PYTHON DERSLERI\n# Seviyye 1: PRINT - Ekrana yazdir\nprint("ZIYADI BABA LEGENDARY")\n\n# Seviyye 2: DEYISEN - Melumat saxla\nad = "Ziyadi"\nyas = 999\nprint(f"Salam {ad}, senin {yas} IQ-un var")\n\n# Seviyye 3: IF - Sert yoxla\nsifre = "doritos"\nif sifre == "doritos":\n    print("GIRIS TESDIQLENDI")\nelse:\n    print("YANLIS SIFRE")\n\n# Seviyye 4: FOR DOVRU - Tekrarla\nfor i in range(5):\n    print(f"HACK #{i+1} TAMAMLANDI")\n\n# Seviyye 5: WHILE DOVRU - Sertli tekrar\nsay = 0\nwhile say < 3:\n    print("Matrix yuklenir...")\n    say += 1\n\n# Seviyye 6: FUNKSIYA - Kodu tekrar istifade et\ndef salam_ver(ad):\n    return f"Xos geldin {ad}, sen efsanesen!"\n\nprint(salam_ver("Hacker"))\n\n# Seviyye 7: LIST - Birden cox melumat saxla\nhackerler = ["Ziyadi", "Doritos", "Matrix"]\nfor h in hackerler:\n    print(f"LEGENDARY: {h}")\n\n# BOSS SEVIYYE: MATRIX KODU\nimport random\nwhile True:\n    print(random.choice(['0','1']), end='')\n\n# ZIYADI BABA DEYIR: KOPYALA, OYREN, HACK ELE\n# Admin seviyyesi: PYTHON HACKER ✓`;const blob=new Blob(['\uFEFF'+codeContent],{type:'text/plain;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='ziyadi_baba_python_dersleri.py';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url)}
function startHack(){const music=$('#bgMusic');music.play().catch(e=>console.log('İlk play bloklandı'));$('#mainContent').classList.add('hidden');$('#terminalContent').classList.remove('hidden');const terminal=$('#terminal');const lines=['> Firewall bypass edilir...','> Root access əldə edilir...','> Şifrələnmiş fayllar açılır...','> Məlumatlar kopyalanır...','> İzlər silinir...','> SİSTEMƏ UĞURLA SIZILDI ✓','> ','> Sən həqiqəti görməyə hazırsan?'];let i=0;function typeLine(){if(i<lines.length){const line=document.createElement('div');line.className='terminal-line';line.style.animationDelay=i*.3+'s';line.textContent=lines[i];terminal.appendChild(line);i++;setTimeout(typeLine,800)}else{setTimeout(()=>{$('#passwordBox').style.opacity='1'},500)}}typeLine()}
function checkPassword(event){if(event.key==='Enter'||event.type==='click'){const pass=$('#passInput').value.trim().toLowerCase(),msg=$('#finalMsg');msg.classList.remove('hidden');if(pass==='doritos'){msg.textContent='GİRİŞ TƏSDİQLƏNDİ ✓';msg.style.color='#0f0';setTimeout(()=>{loadAcademy()},1000)}else{msg.textContent='YANLIŞ ŞİFRƏ ✗';msg.style.color='#f00';$('#passInput').value=''}}
}
function loadAcademy(){let hackerName=localStorage.getItem('ziyadiHackerName')||'';if(!hackerName){app.innerHTML=`<div class="content"><div style="font-size:2rem;margin-bottom:20px">HACKER ADINI DAXİL ET</div><div class="name-box"><input type="text" class="password-input" id="nameInput" placeholder="Adın" maxlength="15"><br><button class="access-btn" onclick="saveName()">[ BAŞLA ]</button></div></div>`}else{showLessons(hackerName)}$('#bgMusic').play().catch(e=>console.log('Auto play bloklandı'))}
function saveName(){const name=$('#nameInput').value.trim();if(name.length<2){alert('Ad ən azı 2 hərf olmalıdır qardaş!');return}localStorage.setItem('ziyadiHackerName',name);showLessons(name)}
function getToday(){return new Date().toISOString().split('T')[0]}
function getDailyQuest(){const quests=['Bu gün 50 dəfə HACK yaz terminala','Şifrə tapmacası: doritos-un tərsini yaz','Matrix-də 3 ədəd "ZIYADI" sözü tap','Kodu yüklə düyməsini 5 dəfə bas','Boss level-i 2 dəfə aktiv et','10 dəfə ekrana toxun/tıkla','Adını tərsinə yaz konsola'];const day=new Date().getDate();return quests[day%quests.length]}
function completeDailyQuest(){const today=getToday();const lastQuest=localStorage.getItem('ziyadiLastQuest');if(lastQuest===today)return;localStorage.setItem('ziyadiLastQuest',today);let goldMedals=parseInt(localStorage.getItem('ziyadiGoldMedals')||'0');goldMedals++;localStorage.setItem('ziyadiGoldMedals',goldMedals);alert('🏆 DAILY QUEST TAMAMLANDI! 🏆\n\n+1 QIZIL MEDAL QAZANDIN\nCəmi: '+goldMedals+' 🏅');updateStats()}
function showLessons(hackerName){let completed=JSON.parse(localStorage.getItem('ziyadiCompleted')||'[]');let bossUnlocked=completed.length===8;const today=getToday();const lastQuest=localStorage.getItem('ziyadiLastQuest');const questDone=lastQuest===today;const dailyQuest=getDailyQuest();const goldMedals=parseInt(localStorage.getItem('ziyadiGoldMedals')||'0');app.innerHTML=`<div class="content"><div style="font-size:2.5rem;font-weight:900;text-transform:uppercase;text-shadow:0 0 20px #0f0,0 0 40px #0f0;animation:blink .5s infinite;margin-bottom:10px">ZIYADI BABA</div><div style="font-size:1.1rem;color:#0f0;text-shadow:0 0 20px #0f0;margin-bottom:10px">✓ XOŞ GƏLDİN ${hackerName.toUpperCase()} ✓</div><div class="quest-box"><div style="font-size:1.1rem;color:#FFD700;margin-bottom:8px">🎯 DAILY QUEST 🎯</div><div style="font-size:.9rem;color:#FFD700">${dailyQuest}</div><button class="quest-btn ${questDone?'done':''}" onclick="completeDailyQuest()" ${questDone?'disabled':''}>${questDone?'[✓ TAMAMLANDI]':'[ QUEST-I BİTİR ]'}</button><span class="medal-counter">🏅 ${goldMedals}</span></div><div class="stats-box" id="statsBox"></div><div class="lesson-box" id="lessonBox"><div style="font-size:1.2rem;margin-bottom:15px;color:#0f0;text-align:center">🔥 DƏRS 1: PYTHON İLƏ HACK BAŞLAYIR 🔥</div>${generateLesson(1,'PRINT - Ekrana yazdır','print("ZIYADI BABA LEGENDARY")','Bu kod ekrana "ZIYADI BABA LEGENDARY" yazır',completed)}${generateLesson(2,'DƏYİŞƏN - Məlumat saxla','ad = "Ziyadi"\nyas = 999\nprint(f"Salam {ad}, sənin {yas} IQ-un var")','Dəyişənlərlə məlumat saxlayıb istifadə edirsən',completed)}${generateLesson(3,'IF - Şərt yoxla','sifre = "doritos"\nif sifre == "doritos":\n    print("GİRİŞ TƏSDİQLƏNDİ")\nelse:\n    print("YANLIŞ ŞİFRƏ")','Bizim saytın məntiqi elə budur qardaş 😂',completed)}${generateLesson(4,'FOR DÖVRÜ - Təkrarla','for i in range(5):\n    print(f"HACK #{i+1} TAMAMLANDI")','5 dəfə "HACK TAMAMLANDI" yazacaq',completed)}${generateLesson(5,'WHILE DÖVRÜ - Şərtli təkrar','say = 0\nwhile say < 3:\n    print("Matrix yüklənir...")\n    say += 1','Şərt doğru olduğu müddətcə təkrarlanır',completed)}${generateLesson(6,'FUNKSİYA - Kodu təkrar istifadə et','def salam_ver(ad):\n    return f"Xoş gəldin {ad}, sən əfsanəsən!"\n\nprint(salam_ver("Hacker"))','Funksiyalar kod təkrarının qarşısını alır',completed)}${generateLesson(7,'LİST - Birdən çox məlumat','hackerler = ["Ziyadi", "Doritos", "Matrix"]\nfor h in hackerler:\n    print(f"LEGENDARY: {h}")','List ilə çox məlumatı bir yerdə saxla',completed)}${generateLesson(8,'BOSS SƏVİYYƏ: MATRIX KODU','import random\nwhile True:\n    print(random.choice([\'0\',\'1\']), end=\'\')','Bizim arxadakı matrix elə budur. Sonsuz 0 və 1 😎',completed)}${bossUnlocked?generateBossLevel(hackerName):''}<div style="text-align:center;margin-top:30px;font-size:1rem;color:#0f0;text-shadow:0 0 10px #0f0">> ZIYADI BABA DEYİR: KOPYALA, ÖYRƏN, HACK ELƏ <br>> Admin səviyyəsi: PYTHON HACKER ✓</div><div style="text-align:center"><button class="download-btn" onclick="downloadLessons()">[ BÜTÜN KODLARI YÜKLƏ .PY ]</button></div></div></div>`;updateStats()}
function generateLesson(num,title,code,desc,completed){const isDone=completed.includes(num);return`<div class="lesson-item ${isDone?'completed':''}" id="lesson${num}"><div style="color:#f00;margin-bottom:8px">> SƏVİYYƏ ${num}: ${title}</div><div class="code-block">${code}</div><div style="font-size:.85rem;margin-top:5px;color:#888">// ${desc}</div><button class="complete-btn ${isDone?'done':''}" onclick="completeLesson(${num})" ${isDone?'disabled':''}>${isDone?'[✓ TAMAMLANDI]':'[ OXUDUM ]'}</button></div>`}
function generateBossLevel(name){return`<div class="lesson-item boss" id="bossLevel"><div style="color:#f00;margin-bottom:8px;font-size:1.3rem;animation:blink .5s infinite">> SƏVİYYƏ 9: HACK THE MATRIX 🔒</div><div style="font-size:.9rem;margin:15px 0;color:#f00">⚠ GİZLİ BOSS LEVEL AÇILDI ⚠</div><div class="code-block" style="border-left:3px solid #f00"># BOSS KODU: MATRIX-I ƏLƏ KEÇİR\nimport os\nimport random\nimport time\n\ndef hack_matrix():\n    print("MATRIX ƏLƏ KEÇİRİLİR...")\n    while True:\n        os.system('color 0A')\n        print(random.choice(['0','1']), end='')\n        time.sleep(0.001)\n\nhack_matrix()  # ZIYADI BABA: ${name}</div><div style="font-size:.85rem;margin-top:5px;color:#ff8888">// Bu kodu işlətsən kompüterin matrix olacaq. TƏHLÜKƏLİ! 😂</div><button class="boss-btn" onclick="activateBossMode()">[ 🔥 MATRIX-I HACK ELƏ 🔥 ]</button></div>`}
function completeLesson(num){let completed=JSON.parse(localStorage.getItem('ziyadiCompleted')||'[]');if(!completed.includes(num)){completed.push(num);localStorage.setItem('ziyadiCompleted',JSON.stringify(completed));$(`#lesson${num}`).classList.add('completed');const btn=$(`#lesson${num} .complete-btn`);btn.textContent='[✓ TAMAMLANDI]';btn.classList.add('done');btn.disabled=true;updateStats();if(completed.length===8){setTimeout(()=>{location.reload()},500)}}
}
function activateBossMode(){clearInterval(matrixInterval);matrixSpeed=10;matrixInterval=setInterval(drawMatrix,matrixSpeed);document.body.style.animation='glitchBoss .3s infinite';$('.lesson-box').style.border='3px solid #f00';$('.lesson-box').style.boxShadow='0 0 50px #f00';alert('🔥 MATRIX HACK EDİLDİ 🔥\n\nZIYADI BABA: '+localStorage.getItem('ziyadiHackerName')+'\nSTATUS: MATRIX OVERLORD ✓\n\nSinifdəkilərə de: "Mən matrix-i hack elədim" 😂');setTimeout(()=>{document.body.style.animation='';clearInterval(matrixInterval);matrixSpeed=35;matrixInterval=setInterval(drawMatrix,matrixSpeed)},5000)}
function updateStats(){let completed=JSON.parse(localStorage.getItem('ziyadiCompleted')||'[]');let count=completed.length;let stars='★'.repeat(count)+'☆'.repeat(8-count);let name=localStorage.getItem('ziyadiHackerName')||'HACKER';let goldMedals=parseInt(localStorage.getItem('ziyadiGoldMedals')||'0');let status='';if(count===8){status='<br>> STATUS: <span style="color:#f00;text-shadow:0 0 10px #f00">ZIYADI BABA MASTER HACKER ✓</span>'}else if(count>=5){status='<br>> STATUS: SENIOR HACKER'}else if(count>=3){status='<br>> STATUS: JUNIOR HACKER'}else{status='<br>> STATUS: NOOB HACKER'}$('#statsBox').innerHTML=`> HACKER: ${name.toUpperCase()}<br>> PROGRESS: ${count}/8 DƏRS ${stars}<br>> QIZIL MEDAL: 🏅 ${goldMedals}${status}`}
window.addEventListener('resize',()=>{canvas.width=innerWidth;canvas.height=innerHeight})
</script>
</body>
</html>
