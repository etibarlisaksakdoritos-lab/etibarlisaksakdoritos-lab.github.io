<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SİSTEMƏ SIZILIR...</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #00ff00;
            font-family: 'Orbitron', monospace;
            overflow: hidden;
            height: 100vh;
            cursor: crosshair;
        }
        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .glitch {
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00, 0 0 30px #00ff00;
            animation: glitch 2s infinite;
        }
        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }
        .warning {
            font-size: 1.2rem;
            margin: 20px 0;
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        .access-btn {
            background: transparent;
            border: 2px solid #00ff00;
            color: #00ff00;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-family: 'Orbitron', monospace;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
            box-shadow: 0 0 20px #00ff00;
            margin-top: 20px;
        }
        .access-btn:hover, .access-btn:active {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 40px #00ff00;
        }
        .hidden { display: none !important; }
        .terminal {
            text-align: left;
            font-size: 0.9rem;
            line-height: 1.6;
            max-width: 600px;
        }
        .terminal-line {
            opacity: 0;
            animation: typewriter 0.5s forwards;
        }
        @keyframes typewriter {
            to { opacity: 1; }
        }
        .password-box {
            margin-top: 30px;
            opacity: 0;
        }
        .password-input {
            background: #000;
            border: 2px solid #00ff00;
            color: #00ff00;
            padding: 10px 20px;
            font-family: 'Orbitron', monospace;
            font-size: 1rem;
            text-align: center;
            outline: none;
            box-shadow: 0 0 15px #00ff00;
            margin: 10px;
        }
        .final-message {
            margin-top: 20px;
            font-size: 1.5rem;
            text-shadow: 0 0 15px #00ff00;
            animation: blink 0.8s infinite;
        }
        .lesson-box {
            background: rgba(0,0,0,0.85);
            border: 2px solid #00ff00;
            padding: 20px;
            max-width: 750px;
            text-align: left;
            box-shadow: 0 0 30px #00ff00;
            overflow-y: auto;
            max-height: 60vh;
            margin-top: 15px;
        }
        .lesson-box::-webkit-scrollbar {
            width: 8px;
        }
        .lesson-box::-webkit-scrollbar-track {
            background: #000;
        }
        .lesson-box::-webkit-scrollbar-thumb {
            background: #00ff00;
        }
        .code-block {
            background: #111;
            padding: 10px;
            border-left: 3px solid #00ff00;
            font-family: monospace;
            margin: 10px 0;
            white-space: pre-wrap;
        }
        .download-btn {
            background: #ff0000;
            border: 2px solid #ff0000;
            color: #fff;
            padding: 12px 30px;
            font-size: 1rem;
            font-family: 'Orbitron', monospace;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
            box-shadow: 0 0 20px #ff0000;
            margin-top: 20px;
            text-decoration: none;
            display: inline-block;
        }
        .download-btn:hover {
            background: #000;
            color: #ff0000;
            box-shadow: 0 0 40px #ff0000;
        }
        .stats-box {
            background: rgba(0,255,0,0.1);
            border: 2px solid #00ff00;
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 1.1rem;
            text-shadow: 0 0 10px #00ff00;
        }
        .lesson-item {
            margin-bottom: 25px;
            padding: 15px;
            border: 1px solid #003300;
            transition: all 0.3s;
        }
        .lesson-item.completed {
            border: 1px solid #00ff00;
            background: rgba(0,255,0,0.05);
            box-shadow: 0 0 15px #00ff00;
        }
        .complete-btn {
            background: transparent;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 5px 15px;
            font-size: 0.8rem;
            font-family: 'Orbitron', monospace;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .complete-btn:hover {
            background: #00ff00;
            color: #000;
        }
        .complete-btn.done {
            background: #00ff00;
            color: #000;
            cursor: default;
        }
        .name-box {
            margin-bottom: 20px;
        }
        @media (max-width: 768px) {
            .glitch { font-size: 2rem; }
            .warning { font-size: 1rem; }
            .lesson-box { max-width: 95%; font-size: 0.75rem; max-height: 55vh; }
            .stats-box { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    
    <audio id="bgMusic" loop>
        <source src="./nazar.mp3" type="audio/mpeg">
    </audio>
    
    <div id="allContent">
        <div class="content" id="mainContent">
            <div class="glitch">SİSTEMƏ SIZILIR</div>
            <div class="warning">⚠ İCAZƏSİZ GİRİŞ AŞKARLANDI ⚠</div>
            <button class="access-btn" onclick="startHack()">[ SİSTEMƏ SIZ ]</button>
        </div>
        
        <div class="content hidden" id="terminalContent">
            <div class="terminal" id="terminal"></div>
            <div class="password-box" id="passwordBox">
                <div>> GİRİŞ ŞİFRƏSİNİ DAXİL ET:</div>
                <input type="text" class="password-input" id="passInput" placeholder="doritos" onkeypress="checkPassword(event)">
                <button class="access-btn" onclick="checkPassword({type:'click'})" style="padding: 10px 20px; margin-top: 10px;">[ GİR ]</button>
                <div class="final-message hidden" id="finalMsg"></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const matrix = "ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789@#$%^&*()*&^%+-/~{[|`]}";
        const matrixArray = matrix.split("");
        const fontSize = 10;
        const columns = canvas.width / fontSize;
        const drops = [];
        for(let x = 0; x < columns; x++) drops[x] = 1;
        
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.04)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff00';
            ctx.font = fontSize + 'px monospace';
            for(let i = 0; i < drops.length; i++) {
                const text = matrixArray[Math.floor(Math.random() * matrixArray.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);
        
        function downloadLessons() {
            const codeContent = `# ZIYADI BABA HACKER AKADEMIYASI - PYTHON DERSLERI
# Seviyye 1: PRINT - Ekrana yazdir
print("ZIYADI BABA LEGENDARY")

# Seviyye 2: DEYISEN - Melumat saxla
ad = "Ziyadi"
yas = 999
print(f"Salam {ad}, senin {yas} IQ-un var")

# Seviyye 3: IF - Sert yoxla
sifre = "doritos"
if sifre == "doritos":
    print("GIRIS TESDIQLENDI")
else:
    print("YANLIS SIFRE")

# Seviyye 4: FOR DOVRU - Tekrarla
for i in range(5):
    print(f"HACK #{i+1} TAMAMLANDI")

# Seviyye 5: WHILE DOVRU - Sertli tekrar
say = 0
while say < 3:
    print("Matrix yuklenir...")
    say += 1

# Seviyye 6: FUNKSIYA - Kodu tekrar istifade et
def salam_ver(ad):
    return f"Xos geldin {ad}, sen efsanesen!"

print(salam_ver("Hacker"))

# Seviyye 7: LIST - Birden cox melumat saxla
hackerler = ["Ziyadi", "Doritos", "Matrix"]
for h in hackerler:
    print(f"LEGENDARY: {h}")

# BOSS SEVIYYE: MATRIX KODU
import random
while True:
    print(random.choice(['0','1']), end='')

# ZIYADI BABA DEYIR: KOPYALA, OYREN, HACK ELE
# Admin seviyyesi: PYTHON HACKER ✓`;
            
            const blob = new Blob(['\uFEFF' + codeContent], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'ziyadi_baba_python_dersleri.py';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        
        function startHack() {
            const music = document.getElementById('bgMusic');
            music.play().catch(e => console.log('İlk play bloklandı'));
            
            document.getElementById('mainContent').classList.add('hidden');
            document.getElementById('terminalContent').classList.remove('hidden');
            
            const terminal = document.getElementById('terminal');
            const lines = [
                '> Firewall bypass edilir...',
                '> Root access əldə edilir...',
                '> Şifrələnmiş fayllar açılır...',
                '> Məlumatlar kopyalanır...',
                '> İzlər silinir...',
                '> SİSTEMƏ UĞURLA SIZILDI ✓',
                '> ',
                '> Sən həqiqəti görməyə hazırsan?'
            ];
            
            let i = 0;
            function typeLine() {
                if (i < lines.length) {
                    const line = document.createElement('div');
                    line.className = 'terminal-line';
                    line.style.animationDelay = i * 0.3 + 's';
                    line.textContent = lines[i];
                    terminal.appendChild(line);
                    i++;
                    setTimeout(typeLine, 800);
                } else {
                    setTimeout(() => {
                        document.getElementById('passwordBox').style.opacity = '1';
                    }, 500);
                }
            }
            typeLine();
        }
        
        function checkPassword(event) {
            if (event.key === 'Enter' || event.type === 'click') {
                const pass = document.getElementById('passInput').value.trim().toLowerCase();
                const msg = document.getElementById('finalMsg');
                msg.classList.remove('hidden');

                if (pass === 'doritos') {
                    msg.textContent = 'GİRİŞ TƏSDİQLƏNDİ ✓';
                    msg.style.color = '#00ff00';

                    setTimeout(() => {
                        loadAcademy();
                    }, 1000);

                } else {
                    msg.textContent = 'YANLIŞ ŞİFRƏ ✗';
                    msg.style.color = '#ff0000';
                    document.getElementById('passInput').value = '';
                }
            }
        }

        function loadAcademy() {
            let hackerName = localStorage.getItem('ziyadiHackerName') || '';
            
            if (!hackerName) {
                document.getElementById('allContent').innerHTML = `
                    <div class="content">
                        <div style="font-size:2rem;margin-bottom:20px;">HACKER ADINI DAXİL ET</div>
                        <div class="name-box">
                            <input type="text" class="password-input" id="nameInput" placeholder="Adın" maxlength="15">
                            <br>
                            <button class="access-btn" onclick="saveName()">[ BAŞLA ]</button>
                        </div>
                    </div>
                `;
            } else {
                showLessons(hackerName);
            }
            document.getElementById('bgMusic').play().catch(e => console.log('Auto play bloklandı'));
        }

        function saveName() {
            const name = document.getElementById('nameInput').value.trim();
            if (name.length < 2) {
                alert('Ad ən azı 2 hərf olmalıdır qardaş!');
                return;
            }
            localStorage.setItem('ziyadiHackerName', name);
            showLessons(name);
        }

        function showLessons(hackerName) {
            let completed = JSON.parse(localStorage.getItem('ziyadiCompleted') || '[]');
            
            document.getElementById('allContent').innerHTML = `
                <div class="content">
                    <div style="font-size:2.5rem;font-weight:900;text-transform:uppercase;text-shadow:0 0 20px #00ff00, 0 0 40px #00ff00;animation:blink 0.5s infinite;margin-bottom:10px;">ZIYADI BABA</div>
                    <div style="font-size:1.1rem;color:#00ff00;text-shadow:0 0 20px #00ff00;margin-bottom:10px;">✓ XOŞ GƏLDİN ${hackerName.toUpperCase()} ✓</div>
                    
                    <div class="stats-box" id="statsBox"></div>
                    
                    <div class="lesson-box">
                        <div style="font-size:1.2rem;margin-bottom:15px;color:#00ff00;text-align:center;">🔥 DƏRS 1: PYTHON İLƏ HACK BAŞLAYIR 🔥</div>
                        
                        ${generateLesson(1, 'PRINT - Ekrana yazdır', 'print("ZIYADI BABA LEGENDARY")', 'Bu kod ekrana "ZIYADI BABA LEGENDARY" yazır', completed)}
                        ${generateLesson(2, 'DƏYİŞƏN - Məlumat saxla', 'ad = "Ziyadi"\nyas = 999\nprint(f"Salam {ad}, sənin {yas} IQ-un var")', 'Dəyişənlərlə məlumat saxlayıb istifadə edirsən', completed)}
                        ${generateLesson(3, 'IF - Şərt yoxla', 'sifre = "doritos"\nif sifre == "doritos":\n    print("GİRİŞ TƏSDİQLƏNDİ")\nelse:\n    print("YANLIŞ ŞİFRƏ")', 'Bizim saytın məntiqi elə budur qardaş 😂', completed)}
                        ${generateLesson(4, 'FOR DÖVRÜ - Təkrarla', 'for i in range(5):\n    print(f"HACK #{i+1} TAMAMLANDI")', '5 dəfə "HACK TAMAMLANDI" yazacaq', completed)}
                        ${generateLesson(5, 'WHILE DÖVRÜ - Şərtli təkrar', 'say = 0\nwhile say < 3:\n    print("Matrix yüklənir...")\n    say += 1', 'Şərt doğru olduğu müddətcə təkrarlanır', completed)}
                        ${generateLesson(6, 'FUNKSİYA - Kodu təkrar istifadə et', 'def salam_ver(ad):\n    return f"Xoş gəldin {ad}, sən əfsanəsən!"\n\nprint(salam_ver("Hacker"))', 'Funksiyalar kod təkrarının qarşısını alır', completed)}
                        ${generateLesson(7, 'LİST - Birdən çox məlumat', 'hackerler = ["Ziyadi", "Doritos", "Matrix"]\nfor h in hackerler:\n    print(f"LEGENDARY: {h}")', 'List ilə çox məlumatı bir yerdə saxla', completed)}
                        ${generateLesson(8, 'BOSS SƏVİYYƏ: MATRIX KODU', 'import random\nwhile True:\n    print(random.choice([\'0\',\'1\']), end=\'\')', 'Bizim arxadakı matrix elə budur. Sonsuz 0 və 1 😎', completed)}

                        <div style="text-align:center;margin-top:30px;font-size:1rem;color:#00ff00;text-shadow:0 0 10px #00ff00;">
                            > ZIYADI BABA DEYİR: KOPYALA, ÖYRƏN, HACK ELƏ <br>
                            > Admin səviyyəsi: PYTHON HACKER ✓
                        </div>

                        <div style="text-align:center;">
                            <button class="download-btn" onclick="downloadLessons()">[ BÜTÜN KODLARI YÜKLƏ .PY ]</button>
                        </div>
                    </div>
                </div>
            `;
            updateStats();
        }

        function generateLesson(num, title, code, desc, completed) {
            const isDone = completed.includes(num);
            return `
                <div class="lesson-item ${isDone ? 'completed' : ''}" id="lesson${num}">
                    <div style="color:#ff0000;margin-bottom:8px;">> SƏVİYYƏ ${num}: ${title}</div>
                    <div class="code-block">${code}</div>
                    <div style="font-size:0.85rem;margin-top:5px;color:#888;">// ${desc}</div>
                    <button class="complete-btn ${isDone ? 'done' : ''}" onclick="completeLesson(${num})" ${isDone ? 'disabled' : ''}>
                        ${isDone ? '[✓ TAMAMLANDI]' : '[ OXUDUM ]'}
                    </button>
                </div>
            `;
        }

        function completeLesson(num) {
            let completed = JSON.parse(localStorage.getItem('ziyadiCompleted') || '[]');
            if (!completed.includes(num)) {
                completed.push(num);
                localStorage.setItem('ziyadiCompleted', JSON.stringify(completed));
                document.getElementById(`lesson${num}`).classList.add('completed');
                const btn = document.querySelector(`#lesson${num} .complete-btn`);
                btn.textContent = '[✓ TAMAMLANDI]';
                btn.classList.add('done');
                btn.disabled = true;
                updateStats();
            }
        }

        function updateStats() {
            let completed = JSON.parse(localStorage.getItem('ziyadiCompleted') || '[]');
            let count = completed.length;
            let stars = '★'.repeat(count) + '☆'.repeat(8-count);
            let name = localStorage.getItem('ziyadiHackerName') || 'HACKER';
            
            let status = '';
            if (count === 8) {
                status = '<br>> STATUS: <span style="color:#ff0000;text-shadow:0 0 10px #ff0000;">ZIYADI BABA MASTER HACKER ✓</span>';
            } else if (count >= 5) {
                status = '<br>> STATUS: SENIOR HACKER';
            } else if (count >= 3) {
                status = '<br>> STATUS: JUNIOR HACKER';
            } else {
                status = '<br>> STATUS: NOOB HACKER';
            }
            
            document.getElementById('statsBox').innerHTML = 
                `> HACKER: ${name.toUpperCase()}<br>> PROGRESS: ${count}/8 DƏRS ${stars}${status}`;
        }
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
