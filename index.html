<!DOCTYPE html>
<html>
<head>
    <title>Doritos Lab HQ</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: #0d1117;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            text-align: center;
            margin: 0;
            overflow: hidden;
        }
        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 17, 23, 0.4);
        }
       .content {
            position: relative;
            z-index: 1;
            padding-top: 80px;
            background: rgba(13, 17, 23, 0.85);
            min-height: 100vh;
        }
        h1 {
            font-size: 40px;
            text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
            margin: 20px 0;
        }
        p {
            font-size: 18px;
            text-shadow: 0 0 5px #00ff00;
            margin: 10px 0;
        }
        img {
            border: 2px solid #00ff00;
            border-radius: 15px;
            margin: 20px 0;
            box-shadow: 0 0 20px #00ff00, 0 0 40px #00ff00;
            width: 200px;
        }
    </style>
</head>
<body>
    ctx.fillStyle = 'rgba(13, 17, 23, 0.02)';
    <div class="content">
        <img src="IMG-20260422-WA0011.jpg" alt="Doritos Lab Logo">
        <h1>🖥️ KALEMINIZI KIRDIM OLMM</h1>
        <p>MEN TANIYAN TANIYIR UREYLERR</p>
        <p>TEZEYEM</p>
        <p>BRATVALARA SALAM</p>
        <p>BABAPUROYUZZ</p>
    </div>
    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;
        const letters = '01DORITOSLABアカサタナハマヤラワ';
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(13, 17, 23, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff00';
            ctx.font = fontSize + 'px monospace';
            for(let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(draw, 35);
        window.addEventListener('resize', () => {
            canvas.height = window.innerHeight;
            canvas.width = window.innerWidth;
        });
    </script>
</body>
</html>
