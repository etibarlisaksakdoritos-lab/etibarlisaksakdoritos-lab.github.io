<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SİSTEMƏ SIZILIR...</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #00ff00;
            font-family: 'Orbitron', monospace;
            overflow: hidden;
            height: 100vh;
            cursor: crosshair;
        }
        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .glitch {
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00, 0 0 30px #00ff00;
            animation: glitch 2s infinite;
        }
        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }
        .warning {
            font-size: 1.2rem;
            margin: 20px 0;
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        .access-btn {
            background: transparent;
            border: 2px solid #00ff00;
            color: #00ff00;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-family: 'Orbitron', monospace;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
            box-shadow: 0 0 20px #00ff00;
            margin-top: 20px;
        }
        .access-btn:hover {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 40px #00ff00;
        }
        .hidden { display: none; }
        .terminal {
            text-align: left;
            font-size: 0.9rem;
            line-height: 1.6;
            max-width: 600px;
        }
        .terminal-line {
            opacity: 0;
            animation: typewriter 0.5s forwards;
        }
        @keyframes typewriter {
            to { opacity: 1; }
        }
        .password-box {
            margin-top: 30px;
            opacity: 0;
        }
        .password-input {
            background: #000;
            border: 2px solid #00ff00;
            color: #00ff00;
            padding: 10px 20px;
            font-family: 'Orbitron', monospace;
            font-size: 1rem;
            text-align: center;
            outline: none;
            box-shadow: 0 0 15px #00ff00;
            margin: 10px;
        }
        .final-message {
            margin-top: 20px;
            font-size: 1.5rem;
            text-shadow: 0 0 15px #00ff00;
            animation: blink 0.8s infinite;
        }
        @media (max-width: 768px) {
            .glitch { font-size: 2rem; }
            .warning { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    
    <audio id="bgMusic" loop>
        <source src="./nazar.mp3" type="audio/mpeg">
    </audio>
    
    <div class="content" id="mainContent">
        <div class="glitch">SİSTEMƏ SIZILIR</div>
        <div class="warning">⚠ İCAZƏSİZ GİRİŞ AŞKARLANDI ⚠</div>
        <button class="access-btn" onclick="startHack()">[ SİSTEMƏ SIZ ]</button>
    </div>
    
    <div class="content hidden" id="terminalContent">
        <div class="terminal" id="terminal"></div>
        <div class="password-box" id="passwordBox">
            <div>> GİRİŞ ŞİFRƏSİNİ DAXİL ET:</div>
            <input type="text" class="password-input" id="passInput" placeholder="doritos" onkeypress="checkPassword(event)">
            <button class="access-btn" onclick="checkPassword({type:'click'})" style="padding: 10px 20px; margin-top: 10px;">[ GİR ]</button>
            <div class="final-message hidden" id="finalMsg"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const matrix = "ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789@#$%^&*()*&^%+-/~{[|`]}";
        const matrixArray = matrix.split("");
        const fontSize = 10;
        const columns = canvas.width / fontSize;
        const drops = [];
        for(let x = 0; x < columns; x++) drops[x] = 1;
        
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.04)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff00';
            ctx.font = fontSize + 'px monospace';
            for(let i = 0; i < drops.length; i++) {
                const text = matrixArray[Math.floor(Math.random() * matrixArray.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);
        
        function startHack() {
            try {
                const music = document.getElementById('bgMusic');
                music.play();
            } catch(e) {
                console.log('Mahnı açılmadı, amma davam edirik');
            }
            
            document.getElementById('mainContent').classList.add('hidden');
            document.getElementById('terminalContent').classList.remove('hidden');
            
            const terminal = document.getElementById('terminal');
            const lines = [
                '> Firewall bypass edilir...',
                '> Root access əldə edilir...',
                '> Şifrələnmiş fayllar açılır...',
                '> Məlumatlar kopyalanır...',
                '> İzlər silinir...',
                '> SİSTEMƏ UĞURLA SIZILDI ✓',
                '> ',
                '> Sən həqiqəti görməyə hazırsan?'
            ];
            
            let i = 0;
            function typeLine() {
                if (i < lines.length) {
                    const line = document.createElement('div');
                    line.className = 'terminal-line';
                    line.style.animationDelay = i * 0.3 + 's';
                    line.textContent = lines[i];
                    terminal.appendChild(line);
                    i++;
                    setTimeout(typeLine, 800);
                } else {
                    setTimeout(() => {
                        document.getElementById('passwordBox').style.opacity = '1';
                    }, 500);
                }
            }
            typeLine();
        }
        
        function checkPassword(event) {
            if (event.key === 'Enter' || event.type === 'click') {
                const pass = document.getElementById('passInput').value.trim().toLowerCase();
                const msg = document.getElementById('finalMsg');
                msg.classList.remove('hidden');
                if (pass === 'doritos') {
                    msg.textContent = 'GİRİŞ TƏSDİQLƏNDİ ✓ XOŞ GƏLDİN QARDAŞ';
                    msg.style.color = '#00ff00';
                    
                    setTimeout(() => {
                        document.getElementById('terminalContent').innerHTML = `
                            <div class="glitch" style="font-size: 4rem; animation: glitch 0.3s infinite;">ZIYADI BABA</div>
                            <div class="warning" style="color: #00ff00; font-size: 1.5rem; margin-top: 30px; text-shadow: 0 0 20px #00ff00;">
                                ✓ SİSTEM TAM SƏNİNDİ ✓
                            </div>
                            <div style="margin-top: 40px; font-size: 1rem; color: #00ff00; text-shadow: 0 0 10px #00ff00;">
                                > Admin səviyyəsi: LEGENDARY<br>
                                > Doritos Protocol: AKTİV<br>
                                > Ziyadi Baba təsdiqlədi ✓
                            </div>
                        `;
                    }, 2000);
                    
                } else {
                    msg.textContent = 'YANLIŞ ŞİFRƏ ✗ YENİDƏN YOXLA';
                    msg.style.color = '#ff0000';
                    document.getElementById('passInput').value = '';
                }
            }
        }
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
