<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SİSTEMƏ SIZILIR...</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#0f0;font-family:'Orbitron',monospace;overflow-x:hidden;cursor:crosshair}
#matrix{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
.sms-bomb-btn{position:fixed;top:15px;left:15px;z-index:999;background:rgba(255,0,0,.9);border:1px solid #f00;padding:5px 12px;font-size:.65rem;color:#fff;text-shadow:0 0 8px #f00;font-family:'Orbitron';cursor:pointer;transition:.3s;animation:blink 1.5s infinite}
.webcam-box{position:fixed;top:50px;right:15px;z-index:998;background:rgba(0,0,0,.95);border:2px solid #f00;padding:10px;font-size:.6rem;color:#f00;text-shadow:0 0 10px #f00;animation:blink 1s infinite;max-width:200px}
.webcam-dot{width:8px;height:8px;background:#f00;border-radius:50%;display:inline-block;margin-right:5px;animation:blink.5s infinite}
.content{position:relative;z-index:10;display:flex;flex-direction:column;justify-content:flex-start;align-items:center;min-height:auto;text-align:center;padding:60px 20px 20px}
.glitch{font-size:3rem;font-weight:900;text-transform:uppercase;text-shadow:0 0 10px #0f0,0 0 20px #0f0;animation:glitch 2s infinite}
@keyframes glitch{0%,100%{transform:translate(0)}20%{transform:translate(-2px,2px)}40%{transform:translate(-2px,-2px)}60%{transform:translate(2px,2px)}80%{transform:translate(2px,-2px)}}
.warning{font-size:1.2rem;margin:20px 0;color:#f00;text-shadow:0 0 10px #f00;animation:blink 1s infinite}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
.access-btn{background:transparent;border:2px solid #0f0;color:#0f0;padding:15px 40px;font-size:1.1rem;font-family:'Orbitron';cursor:pointer;text-transform:uppercase;transition:.3s;box-shadow:0 0 20px #0f0;margin-top:20px}
.access-btn:active{background:#0f0;color:#000}
.hidden{display:none!important}
.terminal{text-align:left;font-size:.9rem;line-height:1.6;max-width:600px}
.terminal-line{opacity:0;animation:typewriter.5s forwards}
@keyframes typewriter{to{opacity:1}}
.password-box{margin-top:30px;opacity:0}
.password-input{background:#000;border:2px solid #0f0;color:#0f0;padding:10px 20px;font-family:'Orbitron';font-size:1rem;text-align:center;outline:none;box-shadow:0 0 15px #0f0;margin:10px}
.final-message{margin-top:20px;font-size:1.5rem;text-shadow:0 0 15px #0f0;animation:blink.8s infinite}
.lesson-box{background:rgba(0,0,0,.85);border:2px solid #0f0;padding:15px;max-width:750px;text-align:left;box-shadow:0 0 30px #0f0;overflow-y:auto;max-height:70vh;margin-top:10px}
.stats-box{background:rgba(0,255,0,.1);border:2px solid #0f0;padding:15px;margin-bottom:15px;text-align:center;font-size:1.1rem;text-shadow:0 0 10px #0f0}
.rank-box{background:rgba(255,215,0,.1);border:2px solid #FFD700;padding:10px;margin-bottom:15px;text-align:center;font-size:1.3rem;color:#FFD700;text-shadow:0 0 15px #FFD700}
.lesson-item{margin-bottom:25px;padding:15px;border:1px solid #030}
.lesson-item.completed{border:1px solid #0f0;background:rgba(0,255,0,.05);box-shadow:0 0 15px #0f0}
.complete-btn{background:transparent;border:1px solid #0f0;color:#0f0;padding:5px 15px;font-size:.8rem;font-family:'Orbitron';cursor:pointer;margin-top:10px}
.complete-btn.done{background:#0f0;color:#000;cursor:default}
.scan-box{font-size:.7rem;color:#f00;text-shadow:0 0 10px #f00;margin-bottom:10px;border:1px solid #f00;padding:8px;background:rgba(255,0,0,.1);text-align:left}
.sms-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:10000;display:flex;justify-content:center;align-items:center;padding:20px}
.sms-box{background:#000;border:3px solid #f00;padding:25px;max-width:400px;width:100%;box-shadow:0 0 50px #f00;animation:shake 0.5s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}
.sms-header{color:#f00;font-size:1.5rem;text-align:center;margin-bottom:20px;text-shadow:0 0 15px #f00}
.sms-input{background:#111;border:2px solid #f00;color:#f00;padding:12px;font-family:'Orbitron';font-size:1rem;width:100%;margin-bottom:15px;outline:none;text-align:center}
.sms-send-btn{background:#f00;border:2px solid #f00;color:#fff;padding:12px;font-family:'Orbitron';cursor:pointer;text-transform:uppercase;width:100%;font-size:1rem}
.sms-cancel-btn{background:transparent;border:1px solid #0f0;color:#0f0;padding:8px;font-family:'Orbitron';cursor:pointer;margin-top:10px;width:100%}
@media(max-width:768px){.glitch{font-size:2rem}.warning{font-size:1rem}.lesson-box{max-width:95%;font-size:.75rem}.webcam-box{font-size:.5rem;max-width:150px}}
</style>
</head>
<body>
<canvas id="matrix"></canvas>
<button class="sms-bomb-btn" onclick="openSmsBomb()">[ SMS BOMBA ]</button>
<div class="webcam-box hidden" id="webcamBox">
<div><span class="webcam-dot"></span>REC</div>
<div>KAMERA AKTİV</div>
<div>ŞƏKİL ÇƏKİLDİ</div>
<div>SERVER: ZIYADI</div>
</div>
<audio id="alarmSound"><source src="data:audio/wav;base64,UklGRjwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQgAAACAgICAgICAgICAgICAgICA" type="audio/wav"></audio>
<audio id="beepSound"><source src="data:audio/wav;base64,UklGRlIAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQ4AAAAAAAD//wAA//8AAP//AAD//wAA" type="audio/wav"></audio>
<div id="allContent">
<div class="content" id="mainContent">
<div class="glitch">SİSTEMƏ SIZILIR</div>
<div class="warning">⚠ İCAZƏSİZ GİRİŞ AŞKARLANDI ⚠</div>
<button class="access-btn" onclick="startHack()">[ SİSTEMƏ SIZ ]</button>
</div>
<div class="content hidden" id="terminalContent">
<div class="terminal" id="terminal"></div>
<div class="password-box" id="passwordBox">
<div>> GİRİŞ ŞİFRƏSİNİ DAXİL ET:</div>
<input type="text" class="password-input" id="passInput" placeholder="doritos" onkeypress="if(event.key==='Enter'){checkPassword()}">
<button class="access-btn" onclick="checkPassword()" style="padding:10px 20px;margin-top:10px">[ GİR ]</button>
<div class="final-message hidden" id="finalMsg"></div>
</div>
</div>
</div>
<div class="sms-overlay hidden" id="smsOverlay">
<div class="sms-box">
<div class="sms-header">💣 SMS BOMBA 💣</div>
<div style="color:#f00;text-align:center;margin-bottom:15px;font-size:.9rem">DOSTUNU HACK ELƏ!</div>
<input type="text" class="sms-input" id="smsNumber" placeholder="+994 50 XXX XX XX" maxlength="20">
<button class="sms-send-btn" onclick="sendFakeSms()">[ SMS GÖNDƏR ]</button>
<button class="sms-cancel-btn" onclick="closeSmsBomb()">[ LƏĞV ET ]</button>
</div>
</div>
<script>
const $=s=>document.querySelector(s);
const app=$('#allContent');
function playBeep(){const s=$('#beepSound');s.currentTime=0;s.play().catch(e=>{})}
function playAlarm(){const s=$('#alarmSound');s.currentTime=0;s.play().catch(e=>{})}
function vibrate(ms){if(navigator.vibrate)navigator.vibrate(ms)}
function openSmsBomb(){playAlarm();vibrate([100,50,100]);$('#smsOverlay').classList.remove('hidden')}
function closeSmsBomb(){playBeep();$('#smsOverlay').classList.add('hidden');$('#smsNumber').value=''}
function sendFakeSms(){
const num=$('#smsNumber').value.trim();
if(num.length<10){playAlarm();vibrate(200);alert('⚠️ NÖMRƏ DÜZGÜN DEYİL!');return}
playAlarm();vibrate([200,100,200,100,300]);closeSmsBomb();
setTimeout(()=>{alert(`💣 SMS GÖNDƏRİLDİ! 💣\n\nNömrə: ${num}\nMesaj: "SƏN HACK OLUNDUN! ZIYADI BABA SƏNİ İZLƏYİR!"\n\n✓ ÇATDIRILDI\n\n😂 TROLL OLDU! (Fake-di, heçnə getmədi)`)},500);
}
const canvas=$('#matrix'),ctx=canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
resize();window.onresize=resize;
const matrix="01".split(""),fontSize=10,drops=Array(Math.floor(canvas.width/fontSize)).fill(1);
setInterval(()=>{ctx.fillStyle='rgba(0,0,0,.04)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#0f0';ctx.font=fontSize+'px monospace';for(let i=0;i<drops.length;i++){const text=matrix[Math.floor(Math.random()*matrix.length)];ctx.fillText(text,i*fontSize,drops[i]*fontSize);if(drops[i]*fontSize>canvas.height&&Math.random()>.975)drops[i]=0;drops[i]++}},35);

function startHack(){playBeep();$('#mainContent').classList.add('hidden');$('#terminalContent').classList.remove('hidden');const terminal=$('#terminal');const lines=['> Firewall bypass edilir...','> Root access əldə edilir...','> Şifrələnmiş fayllar açılır...','> Məlumatlar kopyalanır...','> İzlər silinir...','> SİSTEMƏ UĞURLA SIZILDI ✓','> ','> Sən həqiqəti görməyə hazırsan?'];let i=0;function typeLine(){if(i<lines.length){const line=document.createElement('div');line.className='terminal-line';line.style.animationDelay=i*.3+'s';line.textContent=lines[i];terminal.appendChild(line);i++;setTimeout(typeLine,800)}else{setTimeout(()=>{$('#passwordBox').style.opacity='1'},500)}}typeLine()}
function checkPassword(){playBeep();const pass=$('#passInput').value.trim().toLowerCase(),msg=$('#finalMsg');msg.classList.remove('hidden');if(pass==='doritos'){msg.textContent='GİRİŞ TƏSDİQLƏNDİ ✓';msg.style.color='#0f0';vibrate(100);setTimeout(()=>{loadAcademy()},1000)}else{msg.textContent='YANLIŞ ŞİFRƏ ✗';msg.style.color='#f00';$('#passInput').value='';vibrate([50,50,50])}}

function loadAcademy(){
setTimeout(()=>{
$('#webcamBox').classList.remove('hidden');playAlarm();vibrate([100,50,100]);
setTimeout(()=>{alert('📹 XƏBƏRDARLIQ!\n\nKameran aktiv edildi!\nŞəklin çəkildi və ZIYADI BABA serverinə yükləndi!\n\n😂 TROLL! (Heçnə çəkilmədi)')},1000);
},500);
showLessons();
}

function showLessons(){
app.innerHTML=`<div class="content"><div style="font-size:2.5rem;font-weight:900;text-transform:uppercase;text-shadow:0 0 20px #0f0,0 0 40px #0f0;animation:blink.5s infinite;margin-bottom:10px">ZIYADI BABA</div><div style="font-size:1.1rem;color:#0f0;text-shadow:0 0 20px #0f0;margin-bottom:10px">✓ GİRİŞ UĞURLU ✓</div><div id="scanBox" class="scan-box">🦠 SİSTEM SCAN EDİLİR...</div><div class="rank-box">RÜTBƏ: 👑 LEGENDARY HACKER</div><div class="stats-box">PROGRESS: 8/8 DƏRS | 100% TAMAMLANDI | 🏅 10 QIZIL MEDAL</div><div class="lesson-box"><div style="font-size:1.2rem;font-weight:900;margin-bottom:15px;color:#0f0;text-align:center">💻 BÜTÜN DƏRSLƏR AÇIQDI 💻</div><div class="lesson-item completed"><div style="font-size:1rem;font-weight:700;margin-bottom:10px;color:#0f0">✓ SƏVİYYƏ 1: PRINT</div><div style="font-size:.85rem;color:#0f0">// Ekrana yazdır</div></div><div class="lesson-item completed"><div style="font-size:1rem;font-weight:700;margin-bottom:10px;color:#0f0">✓ SƏVİYYƏ 2: DƏYİŞƏN</div><div style="font-size:.85rem;color:#0f0">// Məlumat saxla</div></div><div class="lesson-item completed"><div style="font-size:1rem;font-weight:700;margin-bottom:10px;color:#0f0">✓ SƏVİYYƏ 3: IF ŞƏRT</div><div style="font-size:.85rem;color:#0f0">// Bizim saytın məntiqi</div></div><div class="lesson-item completed"><div style="font-size:1rem;font-weight:700;margin-bottom:10px;color:#0f0">✓ SƏVİYYƏ 8: BOSS LEVEL</div><div style="font-size:.85rem;color:#0f0">// MATRIX HACK TAMAMLANDI 💀</div></div></div></div>`;
setTimeout(()=>{$('#scanBox').innerHTML='🦠 3 TƏHLÜKƏLİ VİRUS TAPILDI...';playAlarm();},1000);
setTimeout(()=>{$('#scanBox').innerHTML='✓ SİSTEM TƏMİZDİR - ZIYADI BABA QORUYUR';$('#scanBox').style.color='#0f0';$('#scanBox').style.borderColor='#0f0';},4000);
}
</script>
</body>
</html>
