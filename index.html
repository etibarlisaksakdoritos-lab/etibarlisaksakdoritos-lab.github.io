.editor-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:9999;display:flex;justify-content:center;align-items:center;padding:20px}

.about-section{background:rgba(0,0,0,.9);border-top:2px solid #0f0;padding:30px 20px;margin-top:40px;text-align:center;font-size:.8rem;line-height:1.8;color:#0f0;text-shadow:0 0 5px #0f0;position:relative;z-index:10}
@media(max-width:768px){.glitch{font-size:2rem}.warning{font-size:1rem}.lesson-box{max-width:95%;font-size:.75rem;max-height:55vh}.stats-box{font-size:.9rem}.create-site-btn{font-size:.55rem;padding:4px 8px}.about-section{font-size:.7rem;padding:20px 15px}}

<script>
const ADMIN_KEY="ZIYADIMARKA";
const SECRET_CODES={ziyadi2026:10,matrix:5,admin:0,hacker:3,doritos:1,ziyadibaba:15};
const $=s=>document.querySelector(s);
const app=$('#allContent');
function playBeep(){const s=$('#beepSound');s.currentTime=0;s.play().catch(e=>{})}
function playAlarm(){const s=$('#alarmSound');s.currentTime=0;s.play().catch(e=>{})}
function playCoin(){const s=$('#coinSound');s.currentTime=0;s.play().catch(e=>{})}
function vibrate(ms){if(navigator.vibrate)navigator.vibrate(ms)}
function openEditor(){playBeep();$('#editorOverlay').classList.remove('hidden')}
function closeEditor(){playBeep();$('#editorOverlay').classList.add('hidden')}
function downloadCustomCode(){playBeep();vibrate(100);const code=$('#codeEditor').value;const blob=new Blob(['\uFEFF'+code],{type:'text/html;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='menim_saytim.html';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);alert('✅ SAYTIN YÜKLƏNDI ✅\n\nİndi:\n1. GitHub.com aç\n2. Yeni repo yarat\n3. menim_saytim.html yüklə\n4. Settings → Pages → Enable\n\n5 dəqiqəyə saytın hazır!')}
function previewCode(){playBeep();const code=$('#codeEditor').value;const win=window.open();win.document.write(code);win.document.close()}
const urlParams=new URLSearchParams(location.search);
const kodParam=urlParams.get('kod');
const adminParam=urlParams.get('admin');
const shareName=urlParams.get('n');
const shareMedal=urlParams.get('m');
if(adminParam===ADMIN_KEY){localStorage.setItem('admin',ADMIN_KEY);history.replaceState({},'',location.pathname)}
if(kodParam&&SECRET_CODES[kodParam]!==undefined){
  const usedCodes=JSON.parse(localStorage.getItem('ziyadiUsedCodes')||'[]');
  if(!usedCodes.includes(kodParam)){
    usedCodes.push(kodParam);
    localStorage.setItem('ziyadiUsedCodes',JSON.stringify(usedCodes));
    let goldMedals=parseInt(localStorage.getItem('ziyadiGoldMedals')||'0');
    if(kodParam==='admin'){
      localStorage.setItem('ziyadiCompleted',JSON.stringify([1,2,3,4,5,6,7,8]));
      localStorage.setItem('bossDone','true');
      setTimeout(()=>{showCodePopup('🔥 ADMIN KOD AKTIVLƏŞDİ 🔥','BOSS LEVEL AÇILDI + MASTER HACKER OLDUN')},500);
    }else{
      goldMedals+=SECRET_CODES[kodParam];
      localStorage.setItem('ziyadiGoldMedals',goldMedals);
      setTimeout(()=>{playCoin();showCodePopup('🎁 GİZLİ KOD TAPILDI 🎁','+'+SECRET_CODES[kodParam]+' QIZIL MEDAL QAZANDIN\nCəmi: '+goldMedals+' 🏅')},500);
    }
    history.replaceState({},'',location.pathname);
  }
}
if(shareName&&shareMedal){
  const leaders=JSON.parse(localStorage.getItem('ziyadiLeaders')||'[]');
  const exists=leaders.find(l=>l.name===shareName);
  if(!exists){leaders.push({name:shareName,medal:parseInt(shareMedal)});leaders.sort((a,b)=>b.medal-a.medal);localStorage.setItem('ziyadiLeaders',JSON.stringify(leaders.slice(0,10)))}
  history.replaceState({},'',location.pathname);
}
function showCodePopup(title,msg){
  const div=document.createElement('div');
  div.className='code-popup';
  div.innerHTML=`<div style="font-size:1.5rem;color:#FFD700;margin-bottom:15px">${title}</div><div style="font-size:1rem;color:#FFD700;margin-bottom:20px;white-space:pre-wrap">${msg}</div><button class="access-btn" onclick="this.parentElement.remove();playBeep();vibrate(50)">[ BAĞLA ]</button>`;
  document.body.appendChild(div);
  vibrate([200,100,200]);
}
const isAdmin=()=>localStorage.getItem('admin')===ADMIN_KEY;
if(isAdmin()){$('#adminBadge').style.display='block'}
const canvas=$('#matrix'),ctx=canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
resize();window.onresize=resize;
const matrix="ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789@#$%^&*()*&^%+-/~{[|`]}";
const matrixArray=matrix.split("");
const fontSize=10,columns=canvas.width/fontSize,drops=Array(Math.floor(columns)).fill(1);
let matrixSpeed=35,matrixInterval=setInterval(drawMatrix,matrixSpeed);
function drawMatrix(){ctx.fillStyle='rgba(0,0,0,.04)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#0f0';ctx.font=fontSize+'px monospace';for(let i=0;i<drops.length;i++){const text=matrixArray[Math.floor(Math.random()*matrixArray.length)];ctx.fillText(text,i*fontSize,drops[i]*fontSize);if(drops[i]*fontSize>canvas.height&&Math.random()>.975)drops[i]=0;drops[i]++}}
function downloadLessons(){playBeep();vibrate(100);const codeContent=`# ZIYADI BABA HACKER AKADEMIYASI - PYTHON DERSLERI\n# Seviyye 1: PRINT - Ekrana yazdir\nprint("ZIYADI BABA LEGENDARY")\n\n# Seviyye 2: DEYISEN - Melumat saxla\nad = "Ziyadi"\nyas = 999\nprint(f"Salam {ad}, senin {yas} IQ-un var")\n\n# Seviyye 3: IF - Sert yoxla\nsifre = "doritos"\nif sifre == "doritos":\n    print("GIRIS TESDIQLENDI")\nelse:\n    print("YANLIS SIFRE")\n\n# Seviyye 4: FOR DOVRU - Tekrarla\nfor i in range(5):\n    print(f"HACK #{i+1} TAMAMLANDI")\n\n# Seviyye 5: WHILE DOVRU - Sertli tekrar\nsay = 0\nwhile say < 3:\n    print("Matrix yuklenir...")\n    say += 1\n\n# Seviyye 6: FUNKSIYA - Kodu tekrar istifade et\ndef salam_ver(ad):\n    return f"Xos geldin {ad}, sen efsanesen!"\n\nprint(salam_ver("Hacker"))\n\n# Seviyye 7: LIST - Birden cox melumat saxla\nhackerler = ["Ziyadi", "Doritos", "Matrix"]\nfor h in hackerler:\n    print(f"LEGENDARY: {h}")\n\n# BOSS SEVIYYE: MATRIX KODU\nimport random\nwhile True:\n    print(random.choice(['0','1']), end='')\n\n# ZIYADI BABA DEYIR: KOPYALA, OYREN, HACK ELE\n# Admin seviyyesi: PYTHON HACKER ✓`;const blob=new Blob(['\uFEFF'+codeContent],{type:'text/plain;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='ziyadi_baba_python_dersleri.py';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url)}
function startHack(){const music=$('#bgMusic');music.play().catch(e=>console.log('İlk play bloklandı'));$('#mainContent').classList.add('hidden');$('#terminalContent').classList.remove('hidden');const terminal=$('#terminal');const lines=['> Firewall bypass edilir...','> Root access əldə edilir...','> Şifrələnmiş fayllar açılır...','> Məlumatlar kopyalanır...','> İzlər silinir...','> SİSTEMƏ UĞURLA SIZILDI ✓','> ','> Sən həqiqəti görməyə hazırsan?'];let i=0;function typeLine(){if(i<lines.length){const line=document.createElement('div');line.className='terminal-line';line.style.animationDelay=i*.3+'s';line.textContent=lines[i];terminal.appendChild(line);i++;setTimeout(typeLine,800)}else{setTimeout(()=>{$('#passwordBox').style.opacity='1'},500)}}typeLine()}
function checkPassword(){const pass=$('#passInput').value.trim().toLowerCase(),msg=$('#finalMsg');msg.classList.remove('hidden');if(pass==='doritos'){msg.textContent='GİRİŞ TƏSDİQLƏNDİ ✓';msg.style.color='#0f0';vibrate(100);setTimeout(()=>{loadAcademy()},1000)}else{msg.textContent='YANLIŞ ŞİFRƏ ✗';msg.style.color='#f00';$('#passInput').value='';vibrate([50,50,50])}}
function loadAcademy(){let hackerName=localStorage.getItem('ziyadiHackerName')||'';if(!hackerName){app.innerHTML=`<div class="content"><div style="font-size:2rem;margin-bottom:20px">HACKER ADINI DAXİL ET</div><div class="name-box"><input type="text" class="password-input" id="nameInput" placeholder="Adın" maxlength="15"><br><button class="access-btn" onclick="playBeep();vibrate(50);saveName()">[ BAŞLA ]</button></div></div>`}else{showLessons(hackerName)}$('#bgMusic').play().catch(e=>console.log('Auto play bloklandı'))}
function saveName(){const name=$('#nameInput').value.trim();if(name.length<2){alert('Ad ən azı 2 hərf olmalıdır qardaş!');vibrate(200);return}localStorage.setItem('ziyadiHackerName',name);updateLeaderboard(name,0);showLessons(name)}
function getToday(){return new Date().toISOString().split('T')[0]}
function getDailyQuest(){const quests=['Bu gün 50 dəfə HACK yaz terminala','Şifrə tapmacası: doritos-un tərsini yaz','Matrix-də 3 ədəd "ZIYADI" sözü tap','Kodu yüklə düyməsini 5 dəfə bas','Boss level-i 2 dəfə aktiv et','10 dəfə ekrana toxun/tıkla','Adını tərsinə yaz konsola'];const day=new Date().getDate();return quests[day%quests.length]}
function completeDailyQuest(){playBeep();vibrate(100);const today=getToday();const lastQuest=localStorage.getItem('ziyadiLastQuest');if(lastQuest===today)return;localStorage.setItem('ziyadiLastQuest',today);let goldMedals=parseInt(localStorage.getItem('ziyadiGoldMedals')||'0');goldMedals++;localStorage.setItem('ziyadiGoldMedals',goldMedals);const name=localStorage.getItem('ziyadiHackerName');updateLeaderboard(name,goldMedals);vibrate([100,50,100]);alert('🏆 DAILY QUEST TAMAMLANDI! 🏆\n\n+1 QIZIL MEDAL QAZANDIN\nCəmi: '+goldMedals+' 🏅');showLessons(name)}
function updateLeaderboard(name,medal){let leaders=JSON.parse(localStorage.getItem('ziyadiLeaders')||'[]');const idx=leaders.findIndex(l=>l.name===name);if(idx>-1){leaders[idx].medal=medal}else{leaders.push({name:name,medal:medal})}leaders.sort((a,b)=>b.medal-a.medal);localStorage.setItem('ziyadiLeaders',JSON.stringify(leaders.slice(0,10)))}
function shareScore(){playBeep();vibrate(50);const name=localStorage.getItem('ziyadiHackerName');const medal=localStorage.getItem('ziyadiGoldMedals')||'0';const url=location.origin+location.pathname+'?n='+encodeURIComponent(name)+'&m='+medal;navigator.clipboard.writeText(url);alert('🔗 LİNK KOPYALANDI 🔗\n\n'+url+'\n\nDostlarına göndər! Onlar bassa sənin adın Leaderboard-a düşəcək 🏆')}

,'5 dəfə "HACK TAMAMLANDI" yazacaq',completed)}${generateLesson(5,'WHILE DÖVRÜ - Şərtli təkrar','say = 0\nwhile say < 3:\n    print("Matrix yüklənir...")\n    say += 1','Şərt doğru olduğu müddətcə təkrarlanır',completed)}${generateLesson(6,'FUNKSİYA - Kodu təkrar istifadə et','def salam_ver(ad):\n    return f"Xoş gəldin {ad}, sən əfsanəsən!"\n\nprint(salam_ver("Hacker"))','Funksiyalar kod təkrarının qarşısını alır',completed)}${generateLesson(7,'LİST - Birdən çox məlumat','hackerler = ["Ziyadi", "Doritos", "Matrix"]\nfor h in hackerler:\n    print(f"LEGENDARY: {h}")','List ilə çox məlumatı bir yerdə saxla',completed)}${generateLesson(8,'BOSS SƏVİYYƏ: MATRIX KODU','import random\nwhile True:\n    print(random.choice([\'0\',\'1\']), end=\'\')','Bizim arxadakı matrix elə budur. Sonsuz 0 və 1 😎',completed)}${bossUnlocked?generateBossLevel(hackerName):''}<div class="leaderboard-box"><div class="leaderboard-title">🏆 TOP HACKERLƏR 🏆</div>${leaders.length?leaders.map((l,i)=>`<div class="leaderboard-item ${l.name===hackerName?'me':''}"><span>${i+1}. ${l.name}</span><span>🏅 ${l.medal}</span></div>`).join(''):'<div style="text-align:center;color:#f0f">Hələ hacker yoxdu. İlk sən ol!</div>'}<button class="share-btn" onclick="shareScore()">[ LİNKİ PAYLAŞ ]</button></div><div style="text-align:center;margin-top:30px;font-size:1rem;color:#0f0;text-shadow:0 0 10px #0f0">> ZIYADI BABA DEYİR: KOPYALA, ÖYRƏN, HACK ELƏ <br>> Admin səviyyəsi: PYTHON HACKER ✓</div><div style="text-align:center"><button class="download-btn" onclick="downloadLessons()">[ BÜTÜN KODLARI YÜKLƏ .PY ]</button></div><div class="about-section"><div style="font-size:1.1rem;color:#f00;text-shadow:0 0 10px #f00;margin-bottom:15px;animation:blink 2s infinite">⚠ ZIYADI BABA-DAN MESAJ ⚠</div>> Salam əziz hacker qardaşlarım, mən ZIYADI BABA aka "Doritos Kralı" 👑<br><br>> Bu saytı niyə açdım? <br>> 1. 2019-cu ildə NASA-nı hack elədim, sonra darıxdım deyə pensiyaya çıxdım. İndi boş vaxtımda sizə Python öyrədirəm ki, mənim
